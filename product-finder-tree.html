<style>
:root {
  --bg:#060d1b; --text:#e2e8f0; --text-dim:#94a3b8;
  --border:rgba(255,255,255,0.08);
  --emerald:#10b981; --amber:#f59e0b; --cyan:#06b6d4; --orange:#f97316;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  font-family:'Inter','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 80% at 80px 50%,rgba(6,182,212,0.05) 0%,transparent 70%);
}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(6,13,27,0.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left img{height:20px;}
.topbar-left .divider{width:1px;height:16px;background:var(--border);}
.topbar-title{font-size:13px;font-weight:500;color:var(--text-dim);}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);margin-left:8px;}
.breadcrumb .sep{opacity:.3;font-size:9px;}
.breadcrumb .crumb{transition:color .2s;}
.breadcrumb .crumb.active{color:#fff;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-right a{color:var(--text-dim);text-decoration:none;font-size:12px;transition:color .2s;}
.topbar-right a:hover{color:#fff;}
.lang-btn{
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:6px;padding:3px 10px;color:var(--text);cursor:pointer;
  font-size:11px;font-weight:500;transition:all .2s;
}
.lang-btn:hover{background:rgba(255,255,255,0.12);}

/* ── Tree viewport ── */
.tree-viewport{
  position:fixed;inset:0;top:48px;
  overflow:auto;z-index:1;
  padding:40px 40px 60px 40px;
}
.tree-container{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:0;
  min-width:900px;
  width:max-content;
}

/* ── Branch row ── */
.branch{
  display:flex;
  align-items:flex-start;
  position:relative;
  padding:16px 0;
  transition:opacity 0.4s;
}
.branch.dimmed{opacity:0.15;filter:grayscale(0.7);}
.branch.dimmed .l1-node,.branch.dimmed .l2-pill,.branch.dimmed .l3-card{pointer-events:none;}

/* ── Root column ── */
.root-col{
  position:sticky;left:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  width:80px;min-width:80px;
  padding-top:0;
  align-self:stretch;
}
.root-node{
  width:56px;height:56px;border-radius:50%;
  border:2px solid var(--cyan);
  background:radial-gradient(circle,rgba(6,182,212,0.1),rgba(6,13,27,0.95));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(6,182,212,0.25),0 0 48px rgba(6,182,212,0.08);
  animation:root-glow 3s ease-in-out infinite;
  flex-shrink:0;position:relative;z-index:10;
}
.root-node img{width:32px;height:32px;object-fit:contain;}
@keyframes root-glow{
  0%,100%{box-shadow:0 0 24px rgba(6,182,212,0.25),0 0 48px rgba(6,182,212,0.08);}
  50%{box-shadow:0 0 32px rgba(6,182,212,0.4),0 0 64px rgba(6,182,212,0.15);}
}
.root-vline{
  width:2px;flex:1;
  background:linear-gradient(to bottom,rgba(6,182,212,0.3),rgba(255,255,255,0.04));
  margin-top:-1px;
}

/* ── L1 node ── */
.l1-col{
  display:flex;align-items:center;
  width:140px;min-width:140px;
  padding-left:0;
}
.l1-hline{
  width:24px;height:2px;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  transition:all 0.5s;
}
.l1-hline.active{box-shadow:0 0 8px var(--glow-color);}
.l1-node{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.4s;position:relative;
}
.l1-node:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);}
.l1-node.active{
  border-color:var(--cat-color);
  box-shadow:0 0 20px var(--cat-glow);
  background:radial-gradient(circle,var(--cat-bg),rgba(6,13,27,0.95));
}
.l1-node svg{transition:all 0.3s;}
.l1-node.active svg{filter:drop-shadow(0 0 6px var(--cat-color));}
.l1-label{
  margin-left:10px;font-size:12px;font-weight:500;
  color:var(--text-dim);white-space:nowrap;transition:color 0.3s;
}
.l1-node.active ~ .l1-label{color:#fff;font-weight:600;}

/* ── L2 column ── */
.l2-col{
  display:flex;flex-direction:column;gap:6px;
  padding-left:0;min-width:150px;
  position:relative;
}
.l2-hline{
  width:28px;height:2px;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  transition:all 0.5s;
  align-self:center;
  margin-top:14px;
}
.l2-hline.active{box-shadow:0 0 6px var(--glow-color);}
.l2-pill{
  padding:6px 16px;border-radius:20px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  font-size:11px;font-weight:400;color:var(--text-dim);
  cursor:pointer;transition:all 0.35s;white-space:nowrap;
  opacity:0;transform:translateX(-8px);
  display:flex;align-items:center;gap:6px;
}
.l2-pill.visible{opacity:1;transform:translateX(0);}
.l2-pill.dimmed-pill{opacity:0.2 !important;filter:grayscale(0.6);}
.l2-pill:hover{border-color:rgba(255,255,255,0.18);color:#fff;background:rgba(255,255,255,0.06);}
.l2-pill.active{
  border-color:var(--cat-color);color:#fff;font-weight:500;
  background:rgba(255,255,255,0.06);
  box-shadow:0 0 12px var(--cat-glow);
}
.l2-desc{font-size:9px;color:var(--text-dim);opacity:0.6;}

/* ── Bio tabs ── */
.bio-tabs{
  display:flex;gap:4px;margin-bottom:6px;
}
.bio-tab{
  padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  color:var(--text-dim);cursor:pointer;transition:all 0.25s;
}
.bio-tab:hover{border-color:rgba(255,255,255,0.2);color:#fff;}
.bio-tab.active{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:#6ee7b7;}

/* ── L3 column ── */
.l3-col{
  display:flex;flex-direction:column;gap:6px;
  padding-left:0;min-width:220px;
}
.l3-hline{
  width:24px;height:2px;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  transition:all 0.5s;
  align-self:center;
  margin-top:10px;
}
.l3-hline.active{box-shadow:0 0 6px var(--glow-color);}
.l3-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  text-decoration:none;color:inherit;
  transition:all 0.35s;
  opacity:0;transform:translateX(-10px);
  cursor:pointer;min-width:200px;
}
.l3-card.visible{opacity:1;transform:translateX(0);}
.l3-card:hover{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.18);
  transform:translateX(2px);
}
.l3-card:hover .l3-arrow{transform:translateX(3px);}
.l3-name{font-size:12px;font-weight:600;margin-bottom:1px;}
.l3-spec{font-size:10px;color:var(--text-dim);line-height:1.3;}
.l3-arrow{
  font-size:14px;color:var(--text-dim);transition:all 0.3s;
  flex-shrink:0;margin-left:10px;
}

/* ── Connection lines (SVG overlay) ── */
.tree-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:visible;
}

/* ── Energy dot ── */
.energy-dot{
  position:absolute;width:5px;height:5px;border-radius:50%;
  background:var(--dot-color);
  box-shadow:0 0 10px var(--dot-color),0 0 20px var(--dot-color);
  z-index:50;pointer-events:none;opacity:0;
}

/* ── Reset pill ── */
.reset-pill{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;
  background:rgba(6,13,27,0.85);border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:6px 18px;backdrop-filter:blur(16px);
  cursor:pointer;font-size:11px;color:var(--text-dim);font-weight:500;
  transition:all .3s;display:none;align-items:center;gap:6px;
}
.reset-pill.show{display:flex;}
.reset-pill:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#fff;}

/* ── Active path line animation ── */
@keyframes line-draw{
  from{stroke-dashoffset:200;}
  to{stroke-dashoffset:0;}
}

/* ── Mobile ── */
@media(max-width:768px){
  .tree-viewport{padding:20px 16px 70px;}
  .tree-container{min-width:700px;}
  .root-node{width:44px;height:44px;}
  .root-node img{width:24px;height:24px;}
  .root-col{width:60px;min-width:60px;}
  .l1-node{width:40px;height:40px;}
  .l1-col{width:120px;min-width:120px;}
  .l1-label{font-size:10px;}
  .l2-pill{font-size:10px;padding:5px 12px;}
  .l3-card{padding:6px 10px;min-width:170px;}
  .l3-name{font-size:11px;}
  .l3-spec{font-size:9px;}
  .breadcrumb{display:none;}
}
</style>

/* ================================================================
   STATE
   ================================================================ */
var lang = 'ko';
var activeCat = null;
var activeSub = null;
var bioTab = 'use';
var catOrder = ['biobanking','animal','cryo','engineering'];
var svgEl = null;

/* ================================================================
   BUILD TREE
   ================================================================ */
function buildTree(){
  var ct = document.getElementById('treeContainer');
  ct.innerHTML = '';

  // SVG layer for connection lines
  svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('class','tree-svg');
  svgEl.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:visible;';
  ct.appendChild(svgEl);

  // Build each branch row
  catOrder.forEach(function(catId, ci){
    var cfg = catConfig[catId];
    var name = branchNames[catId];
    var data = categorySubcats[catId];
    var items = data.tabs ? data.panels[bioTab] : data.items;

    var branch = document.createElement('div');
    branch.className = 'branch';
    branch.id = 'branch-'+catId;
    branch.setAttribute('data-cat',catId);

    // === Root column (only first branch has the node, others have vline) ===
    var rootCol = document.createElement('div');
    rootCol.className = 'root-col';
    if(ci === 0){
      var rootNode = document.createElement('div');
      rootNode.className = 'root-node';
      rootNode.id = 'root-node';
      rootNode.innerHTML = '<img src="Logo/logo-kc.png" alt="KC">';
      rootCol.appendChild(rootNode);
    }
    // vertical connector
    var vline = document.createElement('div');
    vline.className = 'root-vline';
    vline.id = 'vline-'+catId;
    if(ci === catOrder.length - 1) vline.style.flex = '0';
    rootCol.appendChild(vline);
    branch.appendChild(rootCol);

    // === Horizontal line: root -> L1 ===
    var hl1 = document.createElement('div');
    hl1.className = 'l1-hline';
    hl1.id = 'hline-root-'+catId;
    hl1.style.alignSelf = 'flex-start';
    hl1.style.marginTop = ci === 0 ? '23px' : '14px';
    branch.appendChild(hl1);

    // === L1 column ===
    var l1col = document.createElement('div');
    l1col.className = 'l1-col';
    l1col.style.marginTop = ci === 0 ? '0' : '-9px';

    var l1node = document.createElement('div');
    l1node.className = 'l1-node';
    l1node.id = 'l1-'+catId;
    l1node.style.cssText = '--cat-color:'+cfg.color+';--cat-glow:'+cfg.glow+';--cat-bg:'+cfg.bg+';';
    l1node.innerHTML = '<svg width="22" height="22" fill="none" stroke="'+cfg.color+'" stroke-width="1.5" viewBox="0 0 24 24">'+cfg.icon+'</svg>';
    l1node.onclick = function(){ selectCategory(catId); };

    var l1label = document.createElement('span');
    l1label.className = 'l1-label';
    l1label.setAttribute('data-ko',name.ko);
    l1label.setAttribute('data-en',name.en);
    l1label.textContent = name[lang];

    l1col.appendChild(l1node);
    l1col.appendChild(l1label);
    branch.appendChild(l1col);

    // === Horizontal line: L1 -> L2 ===
    var hl2 = document.createElement('div');
    hl2.className = 'l2-hline';
    hl2.id = 'hline-l1-l2-'+catId;
    branch.appendChild(hl2);

    // === L2 column ===
    var l2col = document.createElement('div');
    l2col.className = 'l2-col';
    l2col.id = 'l2col-'+catId;
    l2col.style.cssText = '--cat-color:'+cfg.color+';--cat-glow:'+cfg.glow+';';

    // Bio tabs (only for biobanking)
    if(catId === 'biobanking' && data.tabs){
      var tabsDiv = document.createElement('div');
      tabsDiv.className = 'bio-tabs';
      tabsDiv.id = 'bio-tabs';
      tabsDiv.style.display = 'none';
      data.tabs.forEach(function(t){
        var btn = document.createElement('button');
        btn.className = 'bio-tab'+(t.id===bioTab?' active':'');
        btn.setAttribute('data-ko',t.ko);
        btn.setAttribute('data-en',t.en);
        btn.textContent = t[lang];
        btn.onclick = function(e){ e.stopPropagation(); switchBioTab(t.id); };
        tabsDiv.appendChild(btn);
      });
      l2col.appendChild(tabsDiv);
    }

    // L2 pills
    items.forEach(function(it){
      var pill = document.createElement('div');
      pill.className = 'l2-pill';
      pill.setAttribute('data-sub',it.id);
      pill.setAttribute('data-ko',it.ko);
      pill.setAttribute('data-en',it.en);
      var pillText = document.createElement('span');
      pillText.textContent = it[lang];
      pill.appendChild(pillText);
      if(it.descKo){
        var desc = document.createElement('span');
        desc.className = 'l2-desc';
        desc.setAttribute('data-ko',it.descKo);
        desc.setAttribute('data-en',it.descEn);
        desc.textContent = lang === 'ko' ? it.descKo : it.descEn;
        pill.appendChild(desc);
      }
      pill.onclick = function(e){ e.stopPropagation(); selectSub(catId, it.id); };
      l2col.appendChild(pill);
    });

    branch.appendChild(l2col);

    // === Horizontal line: L2 -> L3 ===
    var hl3 = document.createElement('div');
    hl3.className = 'l3-hline';
    hl3.id = 'hline-l2-l3-'+catId;
    branch.appendChild(hl3);

    // === L3 column ===
    var l3col = document.createElement('div');
    l3col.className = 'l3-col';
    l3col.id = 'l3col-'+catId;
    branch.appendChild(l3col);

    ct.appendChild(branch);
  });

  // Initial: dim L2/L3
  applyState();
}

/* ================================================================
   APPLY STATE
   ================================================================ */
function applyState(){
  catOrder.forEach(function(catId){
    var branch = document.getElementById('branch-'+catId);
    var l1 = document.getElementById('l1-'+catId);
    var l2col = document.getElementById('l2col-'+catId);
    var l3col = document.getElementById('l3col-'+catId);
    var hl1 = document.getElementById('hline-root-'+catId);
    var hl2 = document.getElementById('hline-l1-l2-'+catId);
    var hl3 = document.getElementById('hline-l2-l3-'+catId);
    var cfg = catConfig[catId];

    // Branch dimming
    if(activeCat && activeCat !== catId){
      branch.classList.add('dimmed');
    } else {
      branch.classList.remove('dimmed');
    }

    // L1 active
    if(activeCat === catId){
      l1.classList.add('active');
      hl1.style.background = cfg.color;
      hl1.style.setProperty('--glow-color',cfg.glow);
      hl1.classList.add('active');
      hl2.style.background = cfg.color;
      hl2.classList.add('active');
      hl2.style.setProperty('--glow-color',cfg.glow);

      // show bio tabs
      var bt = document.getElementById('bio-tabs');
      if(bt && catId === 'biobanking') bt.style.display = 'flex';

      // show L2 pills
      var pills = l2col.querySelectorAll('.l2-pill');
      pills.forEach(function(p, i){
        setTimeout(function(){
          p.classList.add('visible');
        }, i * 50);
        // dim non-active subs
        if(activeSub && p.getAttribute('data-sub') !== activeSub){
          p.classList.add('dimmed-pill');
        } else {
          p.classList.remove('dimmed-pill');
        }
        if(activeSub && p.getAttribute('data-sub') === activeSub){
          p.classList.add('active');
        } else {
          p.classList.remove('active');
        }
      });

      // L3 products
      if(activeSub){
        hl3.style.background = cfg.color;
        hl3.classList.add('active');
        hl3.style.setProperty('--glow-color',cfg.glow);
        showProducts(catId, activeSub);
      } else {
        hl3.style.background = 'rgba(255,255,255,0.06)';
        hl3.classList.remove('active');
        l3col.innerHTML = '';
      }
    } else {
      l1.classList.remove('active');
      hl1.style.background = 'rgba(255,255,255,0.06)';
      hl1.classList.remove('active');
      hl2.style.background = 'rgba(255,255,255,0.06)';
      hl2.classList.remove('active');
      hl3.style.background = 'rgba(255,255,255,0.06)';
      hl3.classList.remove('active');

      var bt = document.getElementById('bio-tabs');
      if(bt && catId === 'biobanking') bt.style.display = 'none';

      // hide L2 pills
      var pills = l2col.querySelectorAll('.l2-pill');
      pills.forEach(function(p){ p.classList.remove('visible','active','dimmed-pill'); });

      l3col.innerHTML = '';
    }
  });

  drawSvgLines();
  updateBreadcrumb();
}

/* ================================================================
   SHOW PRODUCTS (L3)
   ================================================================ */
function showProducts(catId, subId){
  var l3col = document.getElementById('l3col-'+catId);
  l3col.innerHTML = '';
  var prods = productData[subId];
  if(!prods) return;
  var cfg = catConfig[catId];

  prods.forEach(function(p, i){
    var card = document.createElement('a');
    card.className = 'l3-card';
    card.href = p.url;
    card.innerHTML =
      '<div>' +
        '<div class="l3-name" data-ko="'+p.ko+'" data-en="'+p.en+'">'+p[lang]+'</div>' +
        '<div class="l3-spec" data-ko="'+p.specKo+'" data-en="'+p.specEn+'">'+(lang==='ko'?p.specKo:p.specEn)+'</div>' +
      '</div>' +
      '<span class="l3-arrow">' +
        '<svg width="14" height="14" fill="none" stroke="'+cfg.color+'" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>' +
      '</span>';
    card.style.borderColor = 'rgba('+cfg.rgb+',0.15)';
    setTimeout(function(){ card.classList.add('visible'); }, i * 60);
    l3col.appendChild(card);
  });
}

/* ================================================================
   SVG CONNECTION LINES
   ================================================================ */
function drawSvgLines(){
  if(!svgEl) return;
  svgEl.innerHTML = '';
  var ct = document.getElementById('treeContainer');
  var ctRect = ct.getBoundingClientRect();

  function pos(el){
    var r = el.getBoundingClientRect();
    return {
      x: r.left - ctRect.left + r.width/2,
      y: r.top - ctRect.top + r.height/2,
      right: r.right - ctRect.left,
      left: r.left - ctRect.left,
      top: r.top - ctRect.top,
      bottom: r.bottom - ctRect.top,
      w: r.width, h: r.height
    };
  }

  // Root vertical backbone
  var rootNode = document.getElementById('root-node');
  if(!rootNode) return;
  var rp = pos(rootNode);

  // Find last branch top
  var lastCat = catOrder[catOrder.length-1];
  var lastL1 = document.getElementById('l1-'+lastCat);
  if(!lastL1) return;
  var lastP = pos(lastL1);

  // Vertical line from root down
  var vl = document.createElementNS('http://www.w3.org/2000/svg','line');
  vl.setAttribute('x1', rp.x); vl.setAttribute('y1', rp.y + rp.h/2);
  vl.setAttribute('x2', rp.x); vl.setAttribute('y2', lastP.y);
  vl.setAttribute('stroke', activeCat ? catConfig[activeCat].color : 'rgba(255,255,255,0.06)');
  vl.setAttribute('stroke-width', '2');
  if(activeCat){
    vl.setAttribute('stroke-dasharray','200');
    vl.setAttribute('stroke-dashoffset','0');
    vl.style.filter = 'drop-shadow(0 0 4px '+catConfig[activeCat].glow+')';
  }
  svgEl.appendChild(vl);

  // Horizontal connectors from backbone to each L1
  catOrder.forEach(function(catId){
    var l1 = document.getElementById('l1-'+catId);
    var cfg = catConfig[catId];
    var lp = pos(l1);
    var isActive = activeCat === catId;

    // Horizontal: backbone x -> L1 left edge
    var hl = document.createElementNS('http://www.w3.org/2000/svg','line');
    hl.setAttribute('x1', rp.x); hl.setAttribute('y1', lp.y);
    hl.setAttribute('x2', lp.left); hl.setAttribute('y2', lp.y);
    hl.setAttribute('stroke', isActive ? cfg.color : 'rgba(255,255,255,0.06)');
    hl.setAttribute('stroke-width', isActive ? '2' : '1');
    if(isActive) hl.style.filter = 'drop-shadow(0 0 4px '+cfg.glow+')';
    svgEl.appendChild(hl);

    // L1 -> L2 pills lines
    if(isActive){
      var pills = document.querySelectorAll('#l2col-'+catId+' .l2-pill.visible');
      if(pills.length > 0){
        // Main horizontal from L1 right to L2 area
        var firstPill = pos(pills[0]);
        var lastPill = pos(pills[pills.length-1]);

        // Horizontal from L1 right edge
        var l1Right = lp.left + lp.w + 50; // account for label
        var l1LabelEl = document.querySelector('#branch-'+catId+' .l1-label');
        if(l1LabelEl) l1Right = pos(l1LabelEl).right + 10;

        var l2Left = firstPill.left - 10;

        var hMain = document.createElementNS('http://www.w3.org/2000/svg','line');
        hMain.setAttribute('x1', l1Right); hMain.setAttribute('y1', lp.y);
        hMain.setAttribute('x2', l2Left); hMain.setAttribute('y2', lp.y);
        hMain.setAttribute('stroke', cfg.color);
        hMain.setAttribute('stroke-width', '2');
        hMain.style.filter = 'drop-shadow(0 0 4px '+cfg.glow+')';
        svgEl.appendChild(hMain);

        // Vertical branch at L2 left
        if(pills.length > 1){
          var vBranch = document.createElementNS('http://www.w3.org/2000/svg','line');
          vBranch.setAttribute('x1', l2Left); vBranch.setAttribute('y1', firstPill.y);
          vBranch.setAttribute('x2', l2Left); vBranch.setAttribute('y2', lastPill.y);
          vBranch.setAttribute('stroke', cfg.color);
          vBranch.setAttribute('stroke-width', '2');
          vBranch.style.opacity = '0.4';
          svgEl.appendChild(vBranch);
        }

        // Small horizontal ticks to each pill
        pills.forEach(function(pill){
          var pp = pos(pill);
          var tick = document.createElementNS('http://www.w3.org/2000/svg','line');
          tick.setAttribute('x1', l2Left); tick.setAttribute('y1', pp.y);
          tick.setAttribute('x2', pp.left); tick.setAttribute('y2', pp.y);
          var isSubActive = pill.classList.contains('active');
          tick.setAttribute('stroke', isSubActive ? cfg.color : 'rgba('+cfg.rgb+',0.25)');
          tick.setAttribute('stroke-width', isSubActive ? '2' : '1');
          if(isSubActive) tick.style.filter = 'drop-shadow(0 0 4px '+cfg.glow+')';
          svgEl.appendChild(tick);
        });
      }

      // L2 active pill -> L3 cards
      if(activeSub){
        var activePill = document.querySelector('#l2col-'+catId+' .l2-pill.active');
        var cards = document.querySelectorAll('#l3col-'+catId+' .l3-card.visible');
        if(activePill && cards.length > 0){
          var ap = pos(activePill);
          var firstCard = pos(cards[0]);
          var lastCard = pos(cards[cards.length-1]);
          var l3Left = firstCard.left - 10;

          // Horizontal from pill right to L3 area
          var hL3 = document.createElementNS('http://www.w3.org/2000/svg','line');
          hL3.setAttribute('x1', ap.right + 4); hL3.setAttribute('y1', ap.y);
          hL3.setAttribute('x2', l3Left); hL3.setAttribute('y2', ap.y);
          hL3.setAttribute('stroke', cfg.color);
          hL3.setAttribute('stroke-width', '2');
          hL3.style.filter = 'drop-shadow(0 0 4px '+cfg.glow+')';
          svgEl.appendChild(hL3);

          // Vertical at L3 left
          if(cards.length > 1){
            var vL3 = document.createElementNS('http://www.w3.org/2000/svg','line');
            vL3.setAttribute('x1', l3Left); vL3.setAttribute('y1', firstCard.y);
            vL3.setAttribute('x2', l3Left); vL3.setAttribute('y2', lastCard.y);
            vL3.setAttribute('stroke', cfg.color);
            vL3.setAttribute('stroke-width', '2');
            vL3.style.opacity = '0.4';
            svgEl.appendChild(vL3);
          }

          // Ticks to each card
          cards.forEach(function(card){
            var cp = pos(card);
            var tick = document.createElementNS('http://www.w3.org/2000/svg','line');
            tick.setAttribute('x1', l3Left); tick.setAttribute('y1', cp.y);
            tick.setAttribute('x2', cp.left); tick.setAttribute('y2', cp.y);
            tick.setAttribute('stroke', cfg.color);
            tick.setAttribute('stroke-width', '1.5');
            tick.style.filter = 'drop-shadow(0 0 3px '+cfg.glow+')';
            svgEl.appendChild(tick);
          });
        }
      }
    }
  });

  // Energy dot on active path
  if(activeCat) fireEnergyDot();
}

/* ================================================================
   ENERGY DOT
   ================================================================ */
var energyInterval = null;
function fireEnergyDot(){
  if(energyInterval) clearInterval(energyInterval);
  energyInterval = setInterval(function(){
    if(!activeCat) { clearInterval(energyInterval); return; }
    var ct = document.getElementById('treeContainer');
    var ctRect = ct.getBoundingClientRect();
    var rootNode = document.getElementById('root-node');
    var l1 = document.getElementById('l1-'+activeCat);
    if(!rootNode || !l1) return;
    var cfg = catConfig[activeCat];

    var rr = rootNode.getBoundingClientRect();
    var lr = l1.getBoundingClientRect();

    var dot = document.createElement('div');
    dot.className = 'energy-dot';
    dot.style.setProperty('--dot-color', cfg.color);
    var sx = rr.left + rr.width/2 - ctRect.left;
    var sy = rr.top + rr.height/2 - ctRect.top;
    var ex = lr.left - ctRect.left;
    var ey = lr.top + lr.height/2 - ctRect.top;

    dot.style.left = sx + 'px';
    dot.style.top = sy + 'px';
    ct.appendChild(dot);

    var midX = sx;
    var midY = ey;
    var dur = 600;
    var start = null;

    function step(ts){
      if(!start) start = ts;
      var p = Math.min((ts - start) / dur, 1);
      var ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      var cx, cy;
      if(ease < 0.4){
        var t = ease / 0.4;
        cx = sx;
        cy = sy + (midY - sy) * t;
      } else {
        var t = (ease - 0.4) / 0.6;
        cx = sx + (ex - sx) * t;
        cy = midY;
      }
      dot.style.left = cx + 'px';
      dot.style.top = cy + 'px';
      dot.style.opacity = p < 0.1 ? p/0.1 : (p > 0.85 ? (1-p)/0.15 : 0.8);
      if(p < 1) requestAnimationFrame(step);
      else dot.remove();
    }
    requestAnimationFrame(step);
  }, 2500);
}

/* ================================================================
   SELECT CATEGORY
   ================================================================ */
function selectCategory(catId){
  if(activeCat === catId){
    // Toggle off
    activeCat = null;
    activeSub = null;
  } else {
    activeCat = catId;
    activeSub = null;
    bioTab = 'use';
  }

  // Rebuild biobanking L2 if needed
  if(activeCat === 'biobanking') rebuildBioL2();

  applyState();
  document.getElementById('resetPill').classList.toggle('show', !!activeCat);
}

/* ================================================================
   SELECT SUB
   ================================================================ */
function selectSub(catId, subId){
  if(activeSub === subId){
    activeSub = null;
  } else {
    activeSub = subId;
  }
  applyState();
  // Redraw after card animations
  setTimeout(drawSvgLines, 200);
}

/* ================================================================
   BIO TAB SWITCH
   ================================================================ */
function switchBioTab(tabId){
  bioTab = tabId;
  activeSub = null;
  rebuildBioL2();
  applyState();
}

function rebuildBioL2(){
  var l2col = document.getElementById('l2col-biobanking');
  if(!l2col) return;
  var data = categorySubcats.biobanking;
  var items = data.panels[bioTab];
  var cfg = catConfig.biobanking;

  // Remove existing pills (keep tabs)
  var existing = l2col.querySelectorAll('.l2-pill');
  existing.forEach(function(p){ p.remove(); });

  // Rebuild tabs
  var tabsDiv = document.getElementById('bio-tabs');
  if(tabsDiv){
    tabsDiv.innerHTML = '';
    data.tabs.forEach(function(t){
      var btn = document.createElement('button');
      btn.className = 'bio-tab'+(t.id===bioTab?' active':'');
      btn.setAttribute('data-ko',t.ko);
      btn.setAttribute('data-en',t.en);
      btn.textContent = t[lang];
      btn.onclick = function(e){ e.stopPropagation(); switchBioTab(t.id); };
      tabsDiv.appendChild(btn);
    });
  }

  // Add new pills
  items.forEach(function(it){
    var pill = document.createElement('div');
    pill.className = 'l2-pill';
    pill.setAttribute('data-sub',it.id);
    pill.setAttribute('data-ko',it.ko);
    pill.setAttribute('data-en',it.en);
    var pillText = document.createElement('span');
    pillText.textContent = it[lang];
    pill.appendChild(pillText);
    if(it.descKo){
      var desc = document.createElement('span');
      desc.className = 'l2-desc';
      desc.setAttribute('data-ko',it.descKo);
      desc.setAttribute('data-en',it.descEn);
      desc.textContent = lang === 'ko' ? it.descKo : it.descEn;
      pill.appendChild(desc);
    }
    pill.onclick = function(e){ e.stopPropagation(); selectSub('biobanking', it.id); };
    l2col.appendChild(pill);
  });
}

/* ================================================================
   BREADCRUMB
   ================================================================ */
function updateBreadcrumb(){
  var bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  if(!activeCat) return;
  var sep = '<span class="sep">/</span>';
  var catName = branchNames[activeCat][lang];
  bc.innerHTML = sep + '<span class="crumb active">'+catName+'</span>';
  if(activeSub){
    var subName = subNames[activeSub] ? subNames[activeSub][lang] : activeSub;
    bc.innerHTML += sep + '<span class="crumb active">'+subName+'</span>';
  }
}

/* ================================================================
   RESET
   ================================================================ */
function resetTree(){
  activeCat = null;
  activeSub = null;
  bioTab = 'use';
  if(energyInterval) clearInterval(energyInterval);
  buildTree();
  document.getElementById('resetPill').classList.remove('show');
}
window.resetTree = resetTree;

/* ================================================================
   LANGUAGE TOGGLE
   ================================================================ */
function toggleLang(){
  lang = lang === 'ko' ? 'en' : 'ko';
  document.getElementById('langToggle').textContent = lang === 'ko' ? 'EN' : 'KO';
  // Re-render all text
  document.querySelectorAll('[data-ko]').forEach(function(el){
    var val = el.getAttribute('data-'+lang);
    if(val) el.textContent = val;
  });
  // Rebuild for structural elements
  var savedCat = activeCat;
  var savedSub = activeSub;
  var savedTab = bioTab;
  buildTree();
  if(savedCat){
    activeCat = savedCat;
    activeSub = savedSub;
    bioTab = savedTab;
    if(activeCat === 'biobanking') rebuildBioL2();
    applyState();
    setTimeout(drawSvgLines, 250);
    document.getElementById('resetPill').classList.add('show');
  }
}
window.toggleLang = toggleLang;

/* ================================================================
   INIT
   ================================================================ */
buildTree();

// Redraw lines on scroll/resize
var viewport = document.getElementById('treeViewport');
var resizeTimer;
viewport.addEventListener('scroll', function(){ requestAnimationFrame(drawSvgLines); });
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ drawSvgLines(); }, 100);
});

})();
</script>
