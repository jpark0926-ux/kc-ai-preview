<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 찾기 | Korea Cryo</title>
<link rel="icon" href="Logo/logo-kc.png">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f9fa; --text:#1e293b; --text-dim:#64748b;
  --border:rgba(0,0,0,0.08);
  --node-bg:rgba(0,0,0,0.03); --node-border:rgba(0,0,0,0.08);
  --line-default:rgba(0,0,0,0.06);
  --emerald:#10b981; --amber:#f59e0b; --cyan:#06b6d4; --orange:#f97316;
}
body.dark-mode {
  --bg:#060d1b; --text:#e2e8f0; --text-dim:#94a3b8;
  --border:rgba(255,255,255,0.08);
  --node-bg:rgba(255,255,255,0.06); --node-border:rgba(255,255,255,0.1);
  --line-default:rgba(255,255,255,0.06);
  --emerald:#34d399; --amber:#fbbf24; --cyan:#22d3ee; --orange:#fb923c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  font-family:'Inter','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  transition:background .4s,color .4s;
}
body.dark-mode::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 80% at 80px 50%,rgba(6,182,212,0.05) 0%,transparent 70%);
}

/* -- Topbar -- */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(248,249,250,0.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  transition:background .4s;
}
body.dark-mode .topbar{background:rgba(6,13,27,0.92);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left img{height:20px;}
.topbar-left .divider{width:1px;height:16px;background:var(--border);}
.topbar-title{font-size:13px;font-weight:500;color:var(--text-dim);}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);margin-left:8px;}
.breadcrumb .sep{opacity:.3;font-size:9px;}
.breadcrumb .crumb{transition:color .2s;}
.breadcrumb .crumb.active{color:var(--text);font-weight:500;}
body.dark-mode .breadcrumb .crumb.active{color:#fff;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-right a{color:var(--text-dim);text-decoration:none;font-size:12px;transition:color .2s;}
.topbar-right a:hover{color:var(--text);}
body.dark-mode .topbar-right a:hover{color:#fff;}
.lang-btn,.theme-btn{
  background:var(--node-bg);border:1px solid var(--border);
  border-radius:6px;padding:3px 10px;color:var(--text);cursor:pointer;
  font-size:11px;font-weight:500;transition:all .2s;
  display:flex;align-items:center;gap:4px;
}
.lang-btn:hover,.theme-btn:hover{background:rgba(0,0,0,0.06);}
body.dark-mode .lang-btn:hover,body.dark-mode .theme-btn:hover{background:rgba(255,255,255,0.12);}
.theme-btn svg{width:14px;height:14px;}

/* -- Desktop tree viewport -- */
.tree-viewport{
  position:fixed;inset:0;top:48px;
  overflow:auto;z-index:1;
  padding:40px 40px 60px 40px;
}
.tree-container{
  position:relative;
  display:flex;flex-direction:column;gap:0;
  min-width:900px;width:max-content;
  transition:transform .4s ease;
}

/* -- Branch row -- */
.branch{
  display:flex;align-items:flex-start;position:relative;
  padding:10px 0;transition:opacity 0.4s;
  margin-bottom:60px;
}
.branch:last-child{margin-bottom:0;}
.branch.dimmed{opacity:0.15;filter:grayscale(0.7);}
.branch.dimmed .l1-node,.branch.dimmed .l2-pill,.branch.dimmed .l3-card{pointer-events:none;}

/* -- Root column -- */
.root-col{
  position:sticky;left:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  width:80px;min-width:80px;padding-top:0;
}
.root-node{
  width:56px;height:56px;border-radius:50%;
  border:2px solid var(--cyan);
  background:radial-gradient(circle,rgba(6,182,212,0.08),var(--bg));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(6,182,212,0.15);
  animation:root-glow 3s ease-in-out infinite;
  flex-shrink:0;position:relative;z-index:10;
  transition:background .4s;
}
.root-node img{width:32px;height:32px;object-fit:contain;}
@keyframes root-glow{
  0%,100%{box-shadow:0 0 24px rgba(6,182,212,0.15);}
  50%{box-shadow:0 0 32px rgba(6,182,212,0.3);}
}
.root-vline{ display:none; /* SVG bezier curves replace vertical backbone */ }

/* -- L1 node -- */
.l1-col{display:flex;align-items:center;width:140px;min-width:140px;padding-left:0;}
.l1-hline{ display:none; /* SVG bezier replaces */ }
@keyframes linePulse{0%,100%{opacity:.7;box-shadow:0 0 4px var(--glow-color)}50%{opacity:1;box-shadow:0 0 12px var(--glow-color)}}
@keyframes flowRight{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes flowDown{0%{background-position:0 -200%}100%{background-position:0 200%}}
.l1-node{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--node-border);
  background:var(--node-bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.4s;position:relative;
}
.l1-node:hover{border-color:rgba(0,0,0,0.15);background:rgba(0,0,0,0.05);}
body.dark-mode .l1-node:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);}
.l1-node.active{
  border-color:var(--cat-color);
  box-shadow:0 0 20px var(--cat-glow);
  background:radial-gradient(circle,var(--cat-bg),var(--bg));
}
.l1-node svg{transition:all 0.3s;}
.l1-node.active svg{filter:drop-shadow(0 0 6px var(--cat-color));}
.l1-label{
  margin-left:10px;font-size:12px;font-weight:500;
  color:var(--text-dim);white-space:nowrap;transition:color 0.3s;
}
.l1-node.active ~ .l1-label{color:var(--text);font-weight:600;}
body.dark-mode .l1-node.active ~ .l1-label{color:#fff;}
.l1-hint{
  margin-left:10px;font-size:10px;color:var(--text-dim);opacity:0.6;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
  transition:opacity 0.3s;
}
.l1-node.active ~ .l1-hint{opacity:0.9;}

/* -- Hover tooltip -- */
.l2-pill{position:relative;}
.l2-pill::before{
  content:attr(data-tooltip);
  position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) scale(0.9);
  background:var(--text);color:var(--bg);
  padding:4px 10px;border-radius:6px;font-size:10px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:all .2s;z-index:100;
}
.l2-pill::after{
  content:'';position:absolute;bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%) scale(0);
  border:4px solid transparent;border-top-color:var(--text);
  pointer-events:none;opacity:0;transition:all .2s;z-index:100;
}
.l2-pill:hover::before{opacity:1;transform:translateX(-50%) scale(1);}
.l2-pill:hover::after{opacity:1;transform:translateX(-50%) scale(1);}

/* -- L1→L2 bridge line (hidden — SVG bezier replaces) -- */
.l2-bridge{ display:none; }

/* -- L2 column (folder-tree pattern) -- */
.l2-col{
  display:flex;flex-direction:column;gap:0;
  min-width:150px;position:relative;
  padding-left:40px;margin-left:0;
}
/* Hide the old standalone h-line; connector is now ::before on wrapper */
.l2-hline{ display:none; }
/* L2 pill wrapper: horizontal branch + vertical trunk segment */
.l2-pill-wrap{
  position:relative;
  padding-left:0;
  padding-top:6px;padding-bottom:6px;
}
.l2-pill-wrap .l2-pill{ margin-left:0; }
.l2-pill{
  padding:6px 16px;border-radius:20px;
  background:var(--node-bg);
  border:1px solid var(--node-border);
  font-size:11px;font-weight:400;color:var(--text-dim);
  cursor:pointer;transition:all 0.35s;white-space:nowrap;
  opacity:0;transform:translateX(-8px);
  display:flex;align-items:center;gap:6px;
}
.l2-pill.visible{opacity:1;transform:translateX(0);}
.l2-pill.dimmed-pill{opacity:0.2 !important;filter:grayscale(0.6);}
.l2-pill:hover{border-color:rgba(0,0,0,0.18);color:var(--text);background:rgba(0,0,0,0.05);}
body.dark-mode .l2-pill:hover{border-color:rgba(255,255,255,0.18);color:#fff;background:rgba(255,255,255,0.06);}
.l2-pill.active{
  border-color:var(--cat-color);color:var(--text);font-weight:500;
  background:rgba(0,0,0,0.04);
  box-shadow:0 0 12px var(--cat-glow);
}
body.dark-mode .l2-pill.active{color:#fff;background:rgba(255,255,255,0.06);}
.l2-desc{font-size:9px;color:var(--text-dim);opacity:0.6;}

/* -- Bio tabs -- */
.bio-tabs{display:flex;gap:4px;margin-bottom:6px;}
.bio-tab{
  padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;
  background:var(--node-bg);border:1px solid var(--node-border);
  color:var(--text-dim);cursor:pointer;transition:all 0.25s;
}
.bio-tab:hover{border-color:rgba(0,0,0,0.2);color:var(--text);}
body.dark-mode .bio-tab:hover{border-color:rgba(255,255,255,0.2);color:#fff;}
.bio-tab.active{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:#059669;}
body.dark-mode .bio-tab.active{color:#6ee7b7;}

/* -- L3 column (folder-tree pattern) -- */
.l3-col{
  display:flex;flex-direction:column;gap:0;
  min-width:240px;position:relative;
  padding-left:30px;margin-left:0;
}
/* Hide the old standalone h-line */
.l3-hline{ display:none; }
/* L3 card wrapper — SVG bezier curves handle connections */
.l3-card-wrap{
  position:relative;
  padding-left:0;
  padding-top:6px;padding-bottom:6px;
}
.l3-card-wrap .l3-card{ margin-left:0; }
.l3-card{
  display:flex;align-items:center;
  padding:8px 14px;border-radius:10px;
  background:var(--node-bg);
  border:1px solid var(--node-border);
  text-decoration:none;color:inherit;
  transition:all 0.35s;
  opacity:0;transform:translateX(-10px);
  cursor:pointer;min-width:220px;gap:10px;
}
.l3-card.visible{opacity:1;transform:translateX(0);}
.l3-card:hover{
  background:rgba(0,0,0,0.06);
  border-color:rgba(0,0,0,0.18);
  transform:translateX(2px);
}
body.dark-mode .l3-card:hover{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.18);
}
.l3-card:hover .l3-arrow{transform:translateX(3px);}
.l3-thumb{height:40px;width:auto;max-width:50px;object-fit:contain;flex-shrink:0;border-radius:4px;mix-blend-mode:multiply;}
body.dark-mode .l3-thumb{mix-blend-mode:screen;filter:brightness(1.2);}
.l3-info{flex:1;min-width:0;}
.l3-name{font-size:12px;font-weight:600;margin-bottom:1px;}
.l3-spec{font-size:10px;color:var(--text-dim);line-height:1.3;}
.l3-arrow{
  font-size:14px;color:var(--text-dim);transition:all 0.3s;
  flex-shrink:0;margin-left:auto;
}

/* -- SVG connection lines (bezier curves) -- */
.tree-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:visible;
}
.tree-svg path{
  fill:none;stroke-width:2;stroke-linecap:round;
  transition:opacity 0.4s;
}
.tree-svg path.glow{
  filter:drop-shadow(0 0 6px var(--glow-c));
}
@keyframes svgDraw{
  from{stroke-dashoffset:var(--len,300)}
  to{stroke-dashoffset:0}
}
.tree-svg path.draw-anim{
  stroke-dasharray:var(--len,300);
  animation:svgDraw 0.5s ease forwards;
}

/* -- Energy dot with trail -- */
.energy-dot{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:var(--dot-color);
  box-shadow:0 0 12px var(--dot-color),0 0 24px var(--dot-color),0 0 36px var(--dot-color);
  z-index:50;pointer-events:none;opacity:0;
}
.energy-trail{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--dot-color);
  box-shadow:0 0 8px var(--dot-color);
  z-index:49;pointer-events:none;opacity:0;
  transition:opacity 0.4s;
}

/* -- Line draw animation -- */
@keyframes line-draw{
  from{stroke-dashoffset:var(--line-len,200);}
  to{stroke-dashoffset:0;}
}
.svg-line-anim{
  stroke-dasharray:var(--line-len,200);
  stroke-dashoffset:var(--line-len,200);
  animation:line-draw 0.5s ease forwards;
}

/* -- Reset pill -- */
.reset-pill{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;
  background:rgba(248,249,250,0.85);border:1px solid var(--border);
  border-radius:24px;padding:6px 18px;backdrop-filter:blur(16px);
  cursor:pointer;font-size:11px;color:var(--text-dim);font-weight:500;
  transition:all .3s;display:none;align-items:center;gap:6px;
}
body.dark-mode .reset-pill{background:rgba(6,13,27,0.85);}
.reset-pill.show{display:flex;}
.reset-pill:hover{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.18);color:var(--text);}
body.dark-mode .reset-pill:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#fff;}

/* -- Reset zoom animation -- */
.tree-reset-anim{animation:reset-zoom .4s ease;}
@keyframes reset-zoom{
  0%{transform:scale(1);}
  40%{transform:scale(0.95);}
  100%{transform:scale(1);}
}

/* ============================================
   MOBILE: Vertical accordion (<768px)
   ============================================ */
@media(max-width:768px){
  .tree-viewport{
    padding:12px 0 80px;overflow-y:auto;overflow-x:hidden;
  }
  .tree-container{
    min-width:unset;width:100%;display:flex;flex-direction:column;gap:0;
  }
  .tree-svg{display:none;}
  .branch{
    display:flex;flex-direction:column;padding:0;
    border-bottom:1px solid var(--border);
  }
  .branch.dimmed{opacity:1;filter:none;}
  .branch.dimmed .l1-node,.branch.dimmed .l2-pill,.branch.dimmed .l3-card{pointer-events:auto;}
  .root-col{display:none;}
  .l1-hline,.l2-hline,.l3-hline,.l2-bridge{display:none;}
  .l1-col{
    width:100%;min-width:unset;padding:0;
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;cursor:pointer;
  }
  .l1-col::before{
    content:'';display:block;width:4px;height:32px;border-radius:2px;
    background:var(--cat-color);flex-shrink:0;
  }
  .l1-node{width:36px;height:36px;flex-shrink:0;}
  .l1-label{font-size:14px;margin-left:8px;flex:1;}
  .l1-col::after{
    content:'';display:block;width:8px;height:8px;
    border-right:2px solid var(--text-dim);border-bottom:2px solid var(--text-dim);
    transform:rotate(45deg);transition:transform .3s;flex-shrink:0;
  }
  .branch[data-expanded="true"] .l1-col::after{transform:rotate(-135deg);}

  .l2-col{
    max-height:0;overflow:hidden;transition:max-height .4s ease;
    padding:0 20px;width:100%;
    border-left:none !important;
  }
  .l2-pill-wrap{padding-left:0;border-left:none !important;}
  .l2-pill-wrap::before,.l2-pill-wrap::after{display:none;}
  .l2-pill-wrap .l2-pill{margin-left:0;}
  .branch[data-expanded="true"] .l2-col{
    max-height:800px;padding:8px 20px 12px;
  }
  .l2-pill{
    opacity:1;transform:none;
    padding:10px 16px;border-radius:10px;font-size:13px;
    margin-bottom:4px;
  }
  .l2-pill::before,.l2-pill::after{display:none;}
  .l2-pill.visible{opacity:1;transform:none;}

  .l3-col{
    max-height:0;overflow:hidden;transition:max-height .4s ease;
    padding:0 20px;width:100%;
    border-left:none !important;margin-left:0;
  }
  .l3-card-wrap{padding-left:0;border-left:none !important;}
  .l3-card-wrap::before,.l3-card-wrap::after{display:none;}
  .l3-card-wrap .l3-card{margin-left:0;}
  .branch[data-l3-expanded="true"] .l3-col{
    max-height:1200px;padding:4px 20px 12px;
  }
  .l3-card{
    opacity:1;transform:none;min-width:unset;width:100%;
    margin-bottom:4px;
  }
  .l3-card.visible{opacity:1;transform:none;}

  .bio-tabs{flex-wrap:wrap;padding:0 0 8px;}
  .breadcrumb{display:none;}
  .energy-dot,.energy-trail{display:none;}
}
</style>
</head>

<!-- TOP BAR -->

var lang = 'ko';
var darkMode = false;
var activeCat = null;
var activeSub = null;
var bioTab = 'use';
var catOrder = ['biobanking','animal','cryo','engineering'];
var svgEl = null;
var isMobile = window.innerWidth <= 768;

/* ================================================================
   DETECT MOBILE
   ================================================================ */
window.addEventListener('resize', function(){
  var wasMobile = isMobile;
  isMobile = window.innerWidth <= 768;
  if(wasMobile !== isMobile) buildTree();
});

/* ================================================================
   BUILD TREE
   ================================================================ */
function buildTree(){
  var ct = document.getElementById('treeContainer');
  ct.innerHTML = '';

  if(isMobile){
    buildMobileTree(ct);
    return;
  }

  // Create SVG overlay for bezier connection lines
  svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.classList.add('tree-svg');
  ct.appendChild(svgEl);

  catOrder.forEach(function(catId, ci){
    var cfg = catConfig[catId];
    var name = branchNames[catId];
    var data = categorySubcats[catId];
    var items = data.tabs ? data.panels[bioTab] : data.items;

    var branch = document.createElement('div');
    branch.className = 'branch';
    branch.id = 'branch-'+catId;
    branch.setAttribute('data-cat',catId);

    // Root column
    var rootCol = document.createElement('div');
    rootCol.className = 'root-col';
    if(ci === 0){
      var rootNode = document.createElement('div');
      rootNode.className = 'root-node';
      rootNode.id = 'root-node';
      rootNode.innerHTML = '<img src="Logo/logo-kc.png" alt="KC">';
      rootCol.appendChild(rootNode);
      var guideText = document.createElement('div');
      guideText.style.cssText = 'font-size:10px;color:var(--text-dim);opacity:0.7;text-align:center;margin-top:6px;white-space:nowrap;';
      guideText.setAttribute('data-ko','분야를 선택하세요 →');
      guideText.setAttribute('data-en','Select a category →');
      guideText.textContent = lang==='ko'?'분야를 선택하세요 →':'Select a category →';
      rootCol.appendChild(guideText);
    }
    var vline = document.createElement('div');
    vline.className = 'root-vline';
    vline.id = 'vline-'+catId;
    if(ci === catOrder.length - 1) vline.style.flex = '0';
    rootCol.appendChild(vline);
    branch.appendChild(rootCol);

    // H-line root -> L1
    var hl1 = document.createElement('div');
    hl1.className = 'l1-hline';
    hl1.id = 'hline-root-'+catId;
    hl1.style.alignSelf = 'flex-start';
    hl1.style.marginTop = ci === 0 ? '23px' : '14px';
    branch.appendChild(hl1);

    // L1 column
    var l1col = document.createElement('div');
    l1col.className = 'l1-col';
    l1col.style.marginTop = ci === 0 ? '0' : '-9px';

    var l1node = document.createElement('div');
    l1node.className = 'l1-node';
    l1node.id = 'l1-'+catId;
    l1node.style.cssText = '--cat-color:'+cfg.color+';--cat-glow:'+cfg.glow+';--cat-bg:'+cfg.bg+';';
    l1node.innerHTML = '<svg width="22" height="22" fill="none" stroke="'+cfg.color+'" stroke-width="1.5" viewBox="0 0 24 24">'+cfg.icon+'</svg>';
    l1node.onclick = function(){ selectCategory(catId); };

    var l1label = document.createElement('span');
    l1label.className = 'l1-label';
    l1label.setAttribute('data-ko',name.ko);
    l1label.setAttribute('data-en',name.en);
    l1label.textContent = name[lang];

    var l1hint = document.createElement('span');
    l1hint.className = 'l1-hint';
    l1hint.setAttribute('data-ko',name.hintKo||'');
    l1hint.setAttribute('data-en',name.hintEn||'');
    l1hint.textContent = (lang==='ko'?name.hintKo:name.hintEn)||'';

    l1col.appendChild(l1node);
    l1col.appendChild(l1label);
    l1col.appendChild(l1hint);
    branch.appendChild(l1col);

    // Bridge line L1 -> L2
    var bridge = document.createElement('div');
    bridge.className = 'l2-bridge';
    bridge.id = 'bridge-'+catId;
    bridge.style.alignSelf = 'flex-start';
    bridge.style.marginTop = ci === 0 ? '23px' : '14px';
    branch.appendChild(bridge);

    // L2 column
    var l2col = document.createElement('div');
    l2col.className = 'l2-col';
    l2col.id = 'l2col-'+catId;
    l2col.style.cssText = '--cat-color:'+cfg.color+';--cat-glow:'+cfg.glow+';';

    // Bio tabs
    if(catId === 'biobanking' && data.tabs){
      var tabsDiv = document.createElement('div');
      tabsDiv.className = 'bio-tabs';
      tabsDiv.id = 'bio-tabs';
      tabsDiv.style.display = 'none';
      data.tabs.forEach(function(t){
        var btn = document.createElement('button');
        btn.className = 'bio-tab'+(t.id===bioTab?' active':'');
        btn.setAttribute('data-ko',t.ko);
        btn.setAttribute('data-en',t.en);
        btn.textContent = t[lang];
        btn.onclick = function(e){ e.stopPropagation(); switchBioTab(t.id); };
        tabsDiv.appendChild(btn);
      });
      l2col.appendChild(tabsDiv);
    }

    // L2 pills (wrapped for folder-tree connectors)
    items.forEach(function(it){
      var wrap = document.createElement('div');
      wrap.className = 'l2-pill-wrap';
      wrap.setAttribute('data-sub',it.id);

      var pill = document.createElement('div');
      pill.className = 'l2-pill';
      pill.setAttribute('data-sub',it.id);
      pill.setAttribute('data-ko',it.ko);
      pill.setAttribute('data-en',it.en);
      // Tooltip
      var prodCount = productData[it.id] ? productData[it.id].length : 0;
      var tipText = prodCount + (lang==='ko' ? '개 제품 | 클릭하여 제품 보기' : ' products | Click to view');
      pill.setAttribute('data-tooltip', tipText);
      var pillText = document.createElement('span');
      pillText.textContent = it[lang];
      pill.appendChild(pillText);
      if(it.descKo){
        var desc = document.createElement('span');
        desc.className = 'l2-desc';
        desc.setAttribute('data-ko',it.descKo);
        desc.setAttribute('data-en',it.descEn);
        desc.textContent = lang === 'ko' ? it.descKo : it.descEn;
        pill.appendChild(desc);
      }
      pill.onclick = function(e){ e.stopPropagation(); selectSub(catId, it.id); };
      wrap.appendChild(pill);
      l2col.appendChild(wrap);
    });

    branch.appendChild(l2col);

    // Bridge line L2 -> L3
    var bridge3 = document.createElement('div');
    bridge3.className = 'l2-bridge';
    bridge3.id = 'bridge3-'+catId;
    bridge3.style.alignSelf = 'flex-start';

    branch.appendChild(bridge3);

    var l3col = document.createElement('div');

    l3col.id = 'l3col-'+catId;
    branch.appendChild(l3col);

    ct.appendChild(branch);
  });

  applyState();
}

   BUILD MOBILE TREE (Vertical accordion)

      pill.setAttribute('data-ko',it.ko);
      pill.setAttribute('data-en',it.en);

function mobileToggleCat(catId){
  if(activeCat === catId){
    activeCat = null;
    activeSub = null;
  } else {
    activeCat = catId;
    activeSub = null;
    bioTab = 'use';
  }
  buildTree();
  document.getElementById('resetPill').classList.toggle('show', !!activeCat);
}

function mobileSelectSub(catId, subId){
  var branch = document.getElementById('branch-'+catId);
  if(activeSub === subId){
    activeSub = null;
    branch.removeAttribute('data-l3-expanded');
    var l3col = document.getElementById('l3col-'+catId);
    l3col.innerHTML = '';
  } else {
    activeSub = subId;
    branch.setAttribute('data-l3-expanded','true');
    showProducts(catId, subId);
    // Update active pill states
    var pills = document.querySelectorAll('#l2col-'+catId+' .l2-pill');
    pills.forEach(function(p){
      if(p.getAttribute('data-sub')===subId) p.classList.add('active');
      else p.classList.remove('active');
    });
  }
  updateBreadcrumb();
}

/* ================================================================
   APPLY STATE (desktop)
   ================================================================ */
function applyState(){
  if(isMobile) return;
  catOrder.forEach(function(catId){
    var branch = document.getElementById('branch-'+catId);
    var l1 = document.getElementById('l1-'+catId);
    var l2col = document.getElementById('l2col-'+catId);
    var l3col = document.getElementById('l3col-'+catId);
    var hl1 = document.getElementById('hline-root-'+catId);
    var bridgeL2 = document.getElementById('bridge-'+catId);
    var bridgeL3 = document.getElementById('bridge3-'+catId);
    var cfg = catConfig[catId];

    if(activeCat && activeCat !== catId){
      branch.classList.add('dimmed');
    } else {
      branch.classList.remove('dimmed');
    }

    if(activeCat === catId){
      l1.classList.add('active');
      hl1.style.background = cfg.color;
      hl1.style.setProperty('--glow-color',cfg.glow);
      hl1.classList.add('active');

      // Activate bridges
      bridgeL2.style.background = cfg.color;
      bridgeL2.style.setProperty('--glow-color',cfg.glow);
      bridgeL2.classList.add('active');

      // Activate L2 column border
      l2col.classList.add('active');

      var bt = document.getElementById('bio-tabs');
      if(bt && catId === 'biobanking') bt.style.display = 'flex';

      var wraps = l2col.querySelectorAll('.l2-pill-wrap');
      var pills = l2col.querySelectorAll('.l2-pill');
      pills.forEach(function(p, i){
        setTimeout(function(){
          p.classList.add('visible');
          if(!isMobile) requestAnimationFrame(function(){ drawSvgLines(); });
        }, i * 50);
        if(activeSub && p.getAttribute('data-sub') !== activeSub){
          p.classList.add('dimmed-pill');
        } else {
          p.classList.remove('dimmed-pill');
        }
        if(activeSub && p.getAttribute('data-sub') === activeSub){
          p.classList.add('active');
        } else {
          p.classList.remove('active');
        }
      });
      // Activate wrapper ::before lines
      wraps.forEach(function(w){
        var subId = w.getAttribute('data-sub');
        if(activeSub && subId === activeSub){
          w.classList.add('active');
        } else {
          w.classList.remove('active');
        }
        // Set CSS vars for glow
        w.style.setProperty('--cat-color', cfg.color);
        w.style.setProperty('--cat-glow', cfg.glow);
      });

      if(activeSub){
        bridgeL3.style.background = cfg.color;
        bridgeL3.style.setProperty('--glow-color',cfg.glow);
        bridgeL3.classList.add('active');
        // Align bridge3 to selected L2 pill
        var activeWrap = l2col.querySelector('.l2-pill-wrap.active');
        if(activeWrap){
          var wrapRect = activeWrap.getBoundingClientRect();
          var branchRect = document.getElementById('branch-'+catId).getBoundingClientRect();
          bridgeL3.style.marginTop = (wrapRect.top - branchRect.top + wrapRect.height/2 - 1) + 'px';
        }
        showProducts(catId, activeSub);
      } else {
        bridgeL3.style.background = 'var(--line-default)';
        bridgeL3.classList.remove('active');
        l3col.classList.remove('active');
        l3col.innerHTML = '';
      }
    } else {
      l1.classList.remove('active');
      hl1.style.background = 'var(--line-default)';
      hl1.classList.remove('active');

      // Deactivate bridges
      bridgeL2.style.background = 'var(--line-default)';
      bridgeL2.classList.remove('active');
      bridgeL3.style.background = 'var(--line-default)';
      bridgeL3.classList.remove('active');

      // Deactivate L2 column border
      l2col.classList.remove('active');

      var bt = document.getElementById('bio-tabs');
      if(bt && catId === 'biobanking') bt.style.display = 'none';

      var pills = l2col.querySelectorAll('.l2-pill');
      pills.forEach(function(p){ p.classList.remove('visible','active','dimmed-pill'); });
      var wraps = l2col.querySelectorAll('.l2-pill-wrap');
      wraps.forEach(function(w){ w.classList.remove('active'); });

      l3col.classList.remove('active');
      l3col.innerHTML = '';
    }
  });

  // Draw SVG bezier curves after DOM updates
  requestAnimationFrame(function(){ drawSvgLines(); });
  if(activeCat) fireEnergyDot();
  updateBreadcrumb();
}

/* ================================================================
   SVG CONNECTION LINES — smooth bezier curves (NotebookLM style)
   ================================================================ */
function drawSvgLines(){
  if(!svgEl || isMobile) return;
  // Clear existing paths
  while(svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  var ct = document.getElementById('treeContainer');
  var ctRect = ct.getBoundingClientRect();
  svgEl.setAttribute('width', ct.scrollWidth);
  svgEl.setAttribute('height', ct.scrollHeight);

  function pos(el){
    var r = el.getBoundingClientRect();
    return {
      x: r.left - ctRect.left + r.width/2,
      y: r.top - ctRect.top + r.height/2,
      right: r.right - ctRect.left,
      left: r.left - ctRect.left,
      top: r.top - ctRect.top,
      bottom: r.bottom - ctRect.top,
      w: r.width, h: r.height
    };
  }

  function bezier(x1,y1,x2,y2,color,opacity,sw,animate,glowColor){
    var p = document.createElementNS('http://www.w3.org/2000/svg','path');
    // Midpoint X control — clean S-curve that never crosses
    var mx = (x1+x2)/2;
    var d = 'M'+x1+' '+y1+' C'+mx+' '+y1+' '+mx+' '+y2+' '+x2+' '+y2;
    p.setAttribute('d', d);
    p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', sw||2);
    p.style.opacity = opacity;
    if(glowColor){
      p.style.setProperty('--glow-c', glowColor);
      p.classList.add('glow');
    }
    svgEl.appendChild(p);
    if(animate && p.getTotalLength){
      var realLen = Math.ceil(p.getTotalLength());
      p.style.setProperty('--len', realLen);
      p.setAttribute('stroke-dasharray', realLen);
      p.classList.add('draw-anim');
    }
    return p;
  }

  var rootNode = document.getElementById('root-node');
  if(!rootNode) return;
  var rp = pos(rootNode);

  catOrder.forEach(function(catId){
    var l1 = document.getElementById('l1-'+catId);
    var cfg = catConfig[catId];
    var lp = pos(l1);
    var isActive = activeCat === catId;
    var isDimmed = activeCat && activeCat !== catId;

    // Root -> L1 bezier curve
    bezier(rp.x + rp.w/2, rp.y, lp.left, lp.y,
      isActive ? cfg.color : cfg.color,
      isDimmed ? 0.06 : (isActive ? 0.8 : 0.25),
      isActive ? 2.5 : 1.8,
      isActive, isActive ? cfg.glow : null);

    if(isActive){
      var pills = document.querySelectorAll('#l2col-'+catId+' .l2-pill.visible');
      var l1Right = lp.right + 4;

      pills.forEach(function(pill){
        var pp = pos(pill);
        var isSubActive = pill.classList.contains('active');
        var isDimmedPill = activeSub && !isSubActive;
        bezier(l1Right, lp.y, pp.left, pp.y,
          cfg.color,
          isDimmedPill ? 0.08 : (isSubActive ? 0.9 : 0.45),
          isSubActive ? 2.5 : 2,
          true, isSubActive ? cfg.glow : null);
      });

      if(activeSub){
        var activePill = document.querySelector('#l2col-'+catId+' .l2-pill.active');
        var cards = document.querySelectorAll('#l3col-'+catId+' .l3-card.visible');
        if(activePill && cards.length > 0){
          var ap = pos(activePill);
          cards.forEach(function(card){
            var cp = pos(card);
            bezier(ap.right + 4, ap.y, cp.left, cp.y,
              cfg.color, 0.5, 2, true, cfg.glow);
          });
        }
      }
    }
  });
}

/* ================================================================
   ENERGY DOT — with trailing glow
   ================================================================ */
var energyInterval = null;
function fireEnergyDot(){
  if(energyInterval) clearInterval(energyInterval);
  energyInterval = setInterval(function(){
    if(!activeCat || isMobile){ clearInterval(energyInterval); return; }
    var ct = document.getElementById('treeContainer');
    var ctRect = ct.getBoundingClientRect();
    var rootNode = document.getElementById('root-node');
    var l1 = document.getElementById('l1-'+activeCat);
    if(!rootNode || !l1) return;
    var cfg = catConfig[activeCat];

    var rr = rootNode.getBoundingClientRect();
    var lr = l1.getBoundingClientRect();

    var dot = document.createElement('div');
    dot.className = 'energy-dot';
    dot.style.setProperty('--dot-color', cfg.color);
    var sx = rr.left + rr.width/2 - ctRect.left;
    var sy = rr.top + rr.height/2 - ctRect.top;
    var ex = lr.left - ctRect.left;
    var ey = lr.top + lr.height/2 - ctRect.top;

    dot.style.left = sx + 'px';
    dot.style.top = sy + 'px';
    ct.appendChild(dot);

    var midY = ey;
    var dur = 600;
    var start = null;
    var trails = [];

    function step(ts){
      if(!start) start = ts;
      var p = Math.min((ts - start) / dur, 1);
      var ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      var cx, cy;
      if(ease < 0.4){
        var t = ease / 0.4;
        cx = sx;
        cy = sy + (midY - sy) * t;
      } else {
        var t = (ease - 0.4) / 0.6;
        cx = sx + (ex - sx) * t;
        cy = midY;
      }
      dot.style.left = cx + 'px';
      dot.style.top = cy + 'px';
      dot.style.opacity = p < 0.1 ? p/0.1 : (p > 0.85 ? (1-p)/0.15 : 1);

      // Trailing glow particles
      if(Math.random() > 0.5 && p < 0.9){
        var trail = document.createElement('div');
        trail.className = 'energy-trail';
        trail.style.setProperty('--dot-color', cfg.color);
        trail.style.left = cx + 'px';
        trail.style.top = cy + 'px';
        trail.style.opacity = '0.6';
        ct.appendChild(trail);
        trails.push(trail);
        setTimeout(function(){ trail.style.opacity = '0'; }, 50);
        setTimeout(function(){ trail.remove(); }, 500);
      }

      if(p < 1) requestAnimationFrame(step);
      else {
        dot.remove();
        trails.forEach(function(t){ t.remove(); });
      }
    }
    requestAnimationFrame(step);
  }, 2200);
}

/* ================================================================
   SELECT CATEGORY
   ================================================================ */
function selectCategory(catId){
  if(activeCat === catId){
    activeCat = null;
    activeSub = null;
  } else {
    activeCat = catId;
    activeSub = null;
    bioTab = 'use';
  }

  if(activeCat === 'biobanking') rebuildBioL2();

  applyState();
  document.getElementById('resetPill').classList.toggle('show', !!activeCat);
}

/* ================================================================
   SELECT SUB
   ================================================================ */
function selectSub(catId, subId){
  if(activeSub === subId){
    activeSub = null;
  } else {
    activeSub = subId;
  }
  applyState();
}

/* ================================================================
   BIO TAB SWITCH
   ================================================================ */
function switchBioTab(tabId){
  bioTab = tabId;
  activeSub = null;
  rebuildBioL2();
  if(isMobile){
    buildTree();
  } else {
    applyState();
  }
}

function rebuildBioL2(){
  if(isMobile) return;
  var l2col = document.getElementById('l2col-biobanking');
  if(!l2col) return;
  var data = categorySubcats.biobanking;
  var items = data.panels[bioTab];
  var cfg = catConfig.biobanking;

  var existing = l2col.querySelectorAll('.l2-pill-wrap');
  existing.forEach(function(p){ p.remove(); });
  // Also remove any unwrapped pills (legacy)
  var legacyPills = l2col.querySelectorAll('.l2-pill');
  legacyPills.forEach(function(p){ p.remove(); });

  var tabsDiv = document.getElementById('bio-tabs');
  if(tabsDiv){
    tabsDiv.innerHTML = '';
    data.tabs.forEach(function(t){
      var btn = document.createElement('button');
      btn.className = 'bio-tab'+(t.id===bioTab?' active':'');
      btn.setAttribute('data-ko',t.ko);
      btn.setAttribute('data-en',t.en);
      btn.textContent = t[lang];
      btn.onclick = function(e){ e.stopPropagation(); switchBioTab(t.id); };
      tabsDiv.appendChild(btn);
    });
  }

  items.forEach(function(it){
    var wrap = document.createElement('div');
    wrap.className = 'l2-pill-wrap';
    wrap.setAttribute('data-sub',it.id);

    var pill = document.createElement('div');
    pill.className = 'l2-pill';
    pill.setAttribute('data-sub',it.id);
    pill.setAttribute('data-ko',it.ko);
    pill.setAttribute('data-en',it.en);
    var prodCount = productData[it.id] ? productData[it.id].length : 0;
    var tipText = prodCount + (lang==='ko' ? '개 제품 | 클릭하여 제품 보기' : ' products | Click to view');
    pill.setAttribute('data-tooltip', tipText);
    var pillText = document.createElement('span');
    pillText.textContent = it[lang];
    pill.appendChild(pillText);
    if(it.descKo){
      var desc = document.createElement('span');
      desc.className = 'l2-desc';
      desc.setAttribute('data-ko',it.descKo);
      desc.setAttribute('data-en',it.descEn);
      desc.textContent = lang === 'ko' ? it.descKo : it.descEn;
      pill.appendChild(desc);
    }
    pill.onclick = function(e){ e.stopPropagation(); selectSub('biobanking', it.id); };
    wrap.appendChild(pill);
    l2col.appendChild(wrap);
  });
}

/* ================================================================
   BREADCRUMB
   ================================================================ */
function updateBreadcrumb(){
  var bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  if(!activeCat) return;
  var sep = '<span class="sep">/</span>';
  var catName = branchNames[activeCat][lang];
  bc.innerHTML = sep + '<span class="crumb active">'+catName+'</span>';
  if(activeSub){
    var subName = subNames[activeSub] ? subNames[activeSub][lang] : activeSub;
    bc.innerHTML += sep + '<span class="crumb active">'+subName+'</span>';
  }
}

/* ================================================================
   RESET — with zoom-out animation
   ================================================================ */
function resetTree(){
  var ct = document.getElementById('treeContainer');
  ct.classList.add('tree-reset-anim');
  setTimeout(function(){
    ct.classList.remove('tree-reset-anim');
  }, 400);

  activeCat = null;
  activeSub = null;
  bioTab = 'use';
  if(energyInterval) clearInterval(energyInterval);

  // Fade out all active elements then rebuild
  var allActive = document.querySelectorAll('.l1-node.active,.l2-pill.active,.l2-pill.visible,.l3-card.visible');
  allActive.forEach(function(el){
    el.style.transition = 'opacity 0.3s';
    el.style.opacity = '0';
  });

  setTimeout(function(){
    buildTree();
    document.getElementById('resetPill').classList.remove('show');
  }, 300);
}

  } else {
    // Moon icon for "switch to dark"
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>';
  }
}

// Load saved theme
(function(){
  try {
    var saved = localStorage.getItem('kc-tree-theme');
    if(saved === 'dark'){
      darkMode = true;
      document.body.classList.add('dark-mode');
      updateThemeIcon();
    }
  } catch(e){}
})();

/* ================================================================
   LANGUAGE TOGGLE
   ================================================================ */
function toggleLang(){
  lang = lang === 'ko' ? 'en' : 'ko';
  document.getElementById('langToggle').textContent = lang === 'ko' ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko]').forEach(function(el){
    var val = el.getAttribute('data-'+lang);
    if(val) el.textContent = val;
  });
  var savedCat = activeCat;
  var savedSub = activeSub;
  var savedTab = bioTab;
  buildTree();
  if(savedCat){
    activeCat = savedCat;
    activeSub = savedSub;
    bioTab = savedTab;
    if(isMobile){
      buildTree();
    } else {
      if(activeCat === 'biobanking') rebuildBioL2();
      applyState();
    }
    document.getElementById('resetPill').classList.add('show');
  }
}
window.toggleLang = toggleLang;

/* ================================================================
   INIT
   ================================================================ */
buildTree();
// Initial draw of bezier curves
requestAnimationFrame(function(){ drawSvgLines(); });

/* Scroll/resize listeners — redraw bezier curves on layout change */
var resizeTimer = null;
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){ if(!isMobile) drawSvgLines(); }, 100);
});
var viewport = document.getElementById('treeViewport');
if(viewport) viewport.addEventListener('scroll', function(){
  if(!isMobile) requestAnimationFrame(function(){ drawSvgLines(); });
});

})();
</script>
