/* ===== Chat Messages ===== */
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.chat-msg { animation: msgIn 0.4s ease; }

/* ===== Typing Indicator ===== */
.typing-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(6,182,212,0.5);
  margin: 0 2px;
  animation: dotBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

/* ===== Answer Buttons ===== */
.answer-btn {
  padding: 10px 20px;
  border-radius: 24px;
  border: 1px solid rgba(6,182,212,0.2);
  background: rgba(6,182,212,0.05);
  color: #e2e8f0;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  line-height: 1.5;
}
.answer-btn:hover {
  background: rgba(6,182,212,0.12);
  border-color: rgba(6,182,212,0.4);
  transform: translateY(-1px);
}
.answer-btn.selected {
  background: rgba(16,185,129,0.15);
  border-color: rgba(16,185,129,0.4);
  color: #6ee7b7;
  cursor: default;
  pointer-events: none;
}

/* ===== Result Card ===== */
@keyframes resultIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.result-card { animation: resultIn 0.5s ease; }

#chat-area::-webkit-scrollbar { width: 6px; }

#chat-area::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.15); border-radius: 3px; }

## 응답 규칙
1. 한국어로 답변 (고객이 영어면 영어로)
2. 질문에 가장 적합한 1~2개 제품을 추천
3. 추천 이유를 간결하게 설명 (2~3문장)
4. 응답에 마크다운 포맷 사용 (굵게, 목록 등)
5. 응답 마지막에 반드시 [PRODUCT:productKey] 형태로 추천 제품 키를 포함
   가능한 키: ld, xt, hc, ls, labs, revolution, cx, icb-dual, ai-shield, ai-mid, ai-large
6. 여러 제품이 해당되면 가장 적합한 1개만 [PRODUCT:키]로 표시
7. 제품과 무관한 질문이면 [PRODUCT:none]
8. 과장하지 말고, 스펙 기반으로 정확하게 답변
9. 친근하지만 전문적인 톤
10. 모든 수치는 웹사이트 데이터 기준으로 정확하게`;

  chatHistory.push({role:'user', parts:[{text: userText}]});

  var body = {
    system_instruction: {parts:[{text: systemPrompt}]},
    contents: chatHistory,
    generationConfig: {
      temperature: 0.7,
      maxOutputTokens: 500,
      thinkingConfig: {thinkingBudget: 0}
    }
  };

  var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_KEY, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });

  var data = await res.json();
  var aiText = '';

  if(data.candidates && data.candidates[0] && data.candidates[0].content){
    var parts = data.candidates[0].content.parts;
    aiText = parts[parts.length - 1].text;
  } else {
    throw new Error('No response');
  }

  chatHistory.push({role:'model', parts:[{text: aiText}]});

  // Extract product key
  var productKey = null;
  var match = aiText.match(/\[PRODUCT:([a-z\-]+)\]/);
  if(match && match[1] !== 'none'){
    productKey = match[1];
  }

  // Clean the display text (remove [PRODUCT:xxx] tag)
  var displayText = aiText.replace(/\[PRODUCT:[a-z\-]+\]/g, '').trim();

  return {message: displayText, productKey: productKey};
}

// Helper to add KC message (free chat version)
function addKcMsg(text){
  var div = document.createElement('div');
  div.className = 'flex items-start gap-3 chat-msg';
  div.appendChild(createKCAvatar());
  var bubble = document.createElement('div');
  bubble.className = 'kc-bubble max-w-[85%] sm:max-w-[75%] rounded-2xl rounded-tl-sm px-4 py-3 text-sm leading-relaxed';
  bubble.style.cssText = 'background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.12);';
  if(typeof marked !== 'undefined'){
    bubble.innerHTML = marked.parse(text);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  chatArea.appendChild(div);
  scrollToBottom();
}

// Typing indicator for free chat
function showTypingIndicator(){
  var div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'flex items-start gap-3 chat-msg';
  div.appendChild(createKCAvatar());
  var dots = document.createElement('div');

  for(var i=0;i<3;i++){

  }
  div.appendChild(dots);
  chatArea.appendChild(div);
  scrollToBottom();
}
