/* ============================================================
   LANGUAGE TOGGLE
   ============================================================ */
function toggleLang() {
  lang = (lang === 'ko') ? 'en' : 'ko';
  document.getElementById('lang-toggle').textContent = (lang === 'ko') ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko][data-en]').forEach(function(el) {
    var val = el.getAttribute('data-' + lang);
    if (val !== null) {
      if (el.children.length === 0) {
        el.textContent = val;
      } else {
        // For elements that might contain HTML like <br>, use a safe approach
        while (el.firstChild) el.removeChild(el.firstChild);
        // Check if the value contains <br> tags and handle safely
        if (val.indexOf('<br') !== -1) {
          var parts = val.split(/<br\s*\/?>/gi);
          parts.forEach(function(part, i) {
            el.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) el.appendChild(document.createElement('br'));
          });
        } else {
          el.textContent = val;
        }
      }
    }
  });
}

/* ============================================================
   CHAT HELPERS
   ============================================================ */
function scrollToBottom() {
  setTimeout(function() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 50);
}

function createKCAvatar() {
  var av = document.createElement('div');
  av.className = 'kc-avatar';
  av.textContent = 'KC';
  return av;
}

function createMsgBubble(textKo, textEn, isUser) {
  var bubble = document.createElement('div');
  if (isUser) {
    bubble.className = 'inline-block rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm font-medium max-w-[85%] sm:max-w-[75%]';
    bubble.style.cssText = 'background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;';
  } else {
    bubble.className = 'max-w-[85%] sm:max-w-[75%] rounded-2xl rounded-tl-sm px-4 py-3 text-sm leading-relaxed';
    bubble.style.cssText = 'background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.12);';
  }

  var span = document.createElement('span');
  span.setAttribute('data-ko', textKo);
  span.setAttribute('data-en', textEn);
  var text = (lang === 'ko') ? textKo : textEn;

  // Handle <br> safely
  if (text.indexOf('<br') !== -1) {
    var parts = text.split(/<br\s*\/?>/gi);
    parts.forEach(function(part, i) {
      span.appendChild(document.createTextNode(part));
      if (i < parts.length - 1) span.appendChild(document.createElement('br'));
    });
  } else {
    span.textContent = text;
  }

  bubble.appendChild(span);
  return bubble;
}

function addKCMessage(textKo, textEn, cb) {
  // Show typing indicator first
  var typingDiv = document.createElement('div');
  typingDiv.className = 'flex items-start gap-3 chat-msg';
  typingDiv.appendChild(createKCAvatar());
  var dotsWrap = document.createElement('div');
  dotsWrap.className = 'typing-dots mt-2';
  for (var i = 0; i < 3; i++) {
    dotsWrap.appendChild(document.createElement('span'));
  }
  typingDiv.appendChild(dotsWrap);
  chatArea.appendChild(typingDiv);
  scrollToBottom();

  setTimeout(function() {
    chatArea.removeChild(typingDiv);
    var msgDiv = document.createElement('div');
    msgDiv.className = 'flex items-start gap-3 chat-msg';
    msgDiv.appendChild(createKCAvatar());
    msgDiv.appendChild(createMsgBubble(textKo, textEn, false));
    chatArea.appendChild(msgDiv);
    scrollToBottom();
    if (cb) cb();
  }, 400);
}

function addUserMessage(textKo, textEn) {
  var msgDiv = document.createElement('div');
  msgDiv.className = 'flex justify-end chat-msg';
  msgDiv.appendChild(createMsgBubble(textKo, textEn, true));
  chatArea.appendChild(msgDiv);
  scrollToBottom();
}

function clearAnswers() {
  while (answerArea.firstChild) answerArea.removeChild(answerArea.firstChild);
}

/* ============================================================
   SHOW QUESTION + ANSWER BUTTONS
   ============================================================ */
function showQuestion(qId) {
  var q = questions[qId];
  if (!q) return;

  addKCMessage(q.ko, q.en, function() {
    clearAnswers();
    var btnWrap = document.createElement('div');
    btnWrap.className = 'flex flex-wrap gap-2 chat-msg';

    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = (lang === 'ko') ? opt.ko : opt.en;
      btn.setAttribute('data-ko', opt.ko);
      btn.setAttribute('data-en', opt.en);

      btn.addEventListener('click', function() {
        // Disable all buttons visually
        var allBtns = btnWrap.querySelectorAll('.answer-btn');
        for (var i = 0; i < allBtns.length; i++) {
          allBtns[i].classList.add('selected');
          allBtns[i].style.pointerEvents = 'none';
          allBtns[i].style.opacity = '0.4';
        }
        btn.style.opacity = '1';

        addUserMessage(opt.ko, opt.en);
        clearAnswers();

        if (opt.result) {
          showResult(opt.result);
        } else if (opt.next) {
          setTimeout(function() { showQuestion(opt.next); }, 200);
        }
      });

      btnWrap.appendChild(btn);
    });

    answerArea.appendChild(btnWrap);
    scrollToBottom();
  });
}

/* ============================================================
   SHOW RESULT
   ============================================================ */
function showResult(productKey) {
  var p = products[productKey];
  if (!p) return;

  var recKo = '\uCD94\uCC9C \uC81C\uD488\uC744 \uCC3E\uC558\uC2B5\uB2C8\uB2E4! \uC544\uB798 \uC81C\uD488\uC774 \uAC00\uC7A5 \uC801\uD569\uD569\uB2C8\uB2E4.';
  var recEn = 'We found the perfect product for you! Here is our recommendation.';

  addKCMessage(recKo, recEn, function() {
    var card = document.createElement('div');
    card.className = 'result-card chat-msg mx-auto w-full max-w-lg mt-2';

    var name = (lang === 'ko') ? p.name : p.nameEn;
    var desc = (lang === 'ko') ? p.descKo : p.descEn;

    // Outer container
    var outer = document.createElement('div');
    outer.className = 'rounded-2xl overflow-hidden';
    outer.style.cssText = 'background:rgba(6,182,212,0.04);border:1px solid rgba(6,182,212,0.12);';

    // Image section
    var imgWrap = document.createElement('div');
    imgWrap.className = 'flex justify-center p-6 pb-2';
    imgWrap.style.background = 'rgba(255,255,255,0.02)';
    var img = document.createElement('img');
    img.src = p.img;
    img.alt = name;
    img.className = 'product-img';
    img.onerror = function() {
      this.style.display = 'none';
      var fallback = document.createElement('div');
      fallback.className = 'flex items-center justify-center text-white/20 text-sm';
      fallback.style.height = '200px';
      fallback.textContent = (lang === 'ko') ? '\uC774\uBBF8\uC9C0 \uC900\uBE44 \uC911' : 'Image coming soon';
      this.parentElement.appendChild(fallback);
    };
    imgWrap.appendChild(img);
    outer.appendChild(imgWrap);

    // Info section
    var info = document.createElement('div');
    info.className = 'px-5 pb-5 pt-3';

    // Badge
    var badgeRow = document.createElement('div');
    badgeRow.className = 'flex items-center gap-2 mb-1';
    var badge = document.createElement('span');
    badge.className = 'text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full';
    badge.style.cssText = 'background:rgba(6,182,212,0.1);color:#67e8f9;';
    badge.textContent = 'IC Biomedical';
    badgeRow.appendChild(badge);
    info.appendChild(badgeRow);

    // Product name
    var h3 = document.createElement('h3');
    h3.className = 'text-lg font-bold text-white mb-1';
    h3.textContent = name;
    info.appendChild(h3);

    // Description
    var descP = document.createElement('p');
    descP.className = 'text-sm text-white/50 mb-4';
    descP.setAttribute('data-ko', p.descKo);
    descP.setAttribute('data-en', p.descEn);
    descP.textContent = desc;
    info.appendChild(descP);

    // Specs
    var specsDiv = document.createElement('div');
    specsDiv.className = 'mb-5';
    p.specs.forEach(function(s) {
      var row = document.createElement('div');
      row.className = 'flex justify-between items-center py-2';
      row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
      var label = document.createElement('span');
      label.className = 'spec-label text-white/50 text-xs';
      label.setAttribute('data-ko', s.ko);
      label.setAttribute('data-en', s.en);
      label.textContent = (lang === 'ko') ? s.ko : s.en;
      var val = document.createElement('span');
      val.className = 'text-sm font-medium text-white/90';
      val.textContent = s.val;
      row.appendChild(label);
      row.appendChild(val);
      specsDiv.appendChild(row);
    });
    info.appendChild(specsDiv);

    // Action buttons
    var actionsDiv = document.createElement('div');
    actionsDiv.className = 'flex flex-col sm:flex-row gap-2';

    // View details link
    var detailLink = document.createElement('a');
    detailLink.href = p.url;
    detailLink.className = 'flex-1 text-center px-4 py-2.5 rounded-xl text-sm font-semibold transition-all pulse-ring';
    detailLink.style.cssText = 'background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;text-decoration:none;display:block;';
    var detailSpan = document.createElement('span');
    detailSpan.setAttribute('data-ko', '\uC0C1\uC138 \uBCF4\uAE30');
    detailSpan.setAttribute('data-en', 'View Details');
    detailSpan.textContent = (lang === 'ko') ? '\uC0C1\uC138 \uBCF4\uAE30' : 'View Details';
    detailLink.appendChild(detailSpan);
    detailLink.addEventListener('mouseenter', function() { this.style.background = 'rgba(16,185,129,0.25)'; });
    detailLink.addEventListener('mouseleave', function() { this.style.background = 'rgba(16,185,129,0.15)'; });
    actionsDiv.appendChild(detailLink);

    // Start over button
    var resetBtn = document.createElement('button');
    resetBtn.className = 'flex-1 text-center px-4 py-2.5 rounded-xl text-sm font-medium transition-all';
    resetBtn.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);';
    var resetSpan = document.createElement('span');
    resetSpan.setAttribute('data-ko', '\uB2E4\uC2DC \uC2DC\uC791');
    resetSpan.setAttribute('data-en', 'Start Over');
    resetSpan.textContent = (lang === 'ko') ? '\uB2E4\uC2DC \uC2DC\uC791' : 'Start Over';
    resetBtn.appendChild(resetSpan);
    resetBtn.addEventListener('click', resetChat);
    resetBtn.addEventListener('mouseenter', function() { this.style.background = 'rgba(255,255,255,0.08)'; });
    resetBtn.addEventListener('mouseleave', function() { this.style.background = 'rgba(255,255,255,0.04)'; });
    actionsDiv.appendChild(resetBtn);

    info.appendChild(actionsDiv);

    // Expert consultation link
    var expertDiv = document.createElement('div');
    expertDiv.className = 'mt-3 text-center';
    var expertLink = document.createElement('a');
    expertLink.href = 'tel:031-737-8171';
    expertLink.className = 'text-xs text-white/35 hover:text-cyan-400/70 transition';
    var expertSpan = document.createElement('span');
    expertSpan.setAttribute('data-ko', '\uC804\uBB38\uAC00 \uC0C1\uB2F4 031-737-8171');
    expertSpan.setAttribute('data-en', 'Expert consultation 031-737-8171');
    expertSpan.textContent = (lang === 'ko') ? '\uC804\uBB38\uAC00 \uC0C1\uB2F4 031-737-8171' : 'Expert consultation 031-737-8171';
    expertLink.appendChild(expertSpan);
    expertDiv.appendChild(expertLink);
    info.appendChild(expertDiv);

    outer.appendChild(info);
    card.appendChild(outer);
    chatArea.appendChild(card);
    scrollToBottom();
  });
}

/* ============================================================
   RESET
   ============================================================ */
function resetChat() {
  while (chatArea.firstChild) chatArea.removeChild(chatArea.firstChild);
  clearAnswers();
  startChat();
}

/* ============================================================
   INIT
   ============================================================ */
function startChat() {
  addKCMessage(
    '\uC548\uB155\uD558\uC138\uC694! \uD55C\uAD6D\uCD08\uC800\uC628\uC6A9\uAE30\uC785\uB2C8\uB2E4.<br>\uCD5C\uC801\uC758 \uADF9\uC800\uC628 \uC7A5\uBE44\uB97C \uCC3E\uC544\uB4DC\uB9B4\uAC8C\uC694.',
    'Hello! This is Korea Cryo.<br>Let us help you find the perfect cryogenic equipment.'
  , function() {
    setTimeout(function() {
      showQuestion('Q1');
    }, 500);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  chatArea = document.getElementById('chat-area');
  answerArea = document.getElementById('answer-area');
  startChat();
});
</script>
