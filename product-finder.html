<style>
:root {
  --bg: #0a0a0a;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --emerald: #10b981;
  --amber: #f59e0b;
  --cyan: #06b6d4;
  --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family:'Inter','Noto Sans KR',sans-serif;
  background:#0a0a0a;
  color:var(--text);
  height:100%; overflow:hidden;
}

/* ── TOP BAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(10,10,10,0.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar-left img { height:24px; }
.topbar-left .divider { width:1px; height:20px; background:var(--border); }
.breadcrumb { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-dim); }
.breadcrumb .crumb { cursor:pointer; transition:color .2s; }
.breadcrumb .crumb:hover { color:#fff; }
.breadcrumb .crumb.active { color:#fff; font-weight:500; }
.breadcrumb .sep { opacity:.3; font-size:11px; }
.topbar-right { display:flex; align-items:center; gap:14px; }
.topbar-right a { color:var(--text-dim); text-decoration:none; font-size:13px; transition:color .2s; }
.topbar-right a:hover { color:#fff; }
.lang-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  border-radius:6px; padding:4px 12px; color:var(--text); cursor:pointer;
  font-size:12px; font-weight:500; transition:all .2s;
}
.lang-btn:hover { background:rgba(255,255,255,0.12); }
.back-btn {
  display:none; align-items:center; gap:4px; cursor:pointer;
  color:var(--text-dim); font-size:13px; transition:color .2s; background:none; border:none;
}
.back-btn:hover { color:#fff; }
.back-btn.show { display:flex; }

/* ── SCENE SYSTEM ── */
.scene {
  position:fixed; inset:0; top:56px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
  z-index:1; overflow-y:auto; overflow-x:hidden;
  padding:40px 24px 100px;
}
.scene.zoom-out {
  transform:scale(1.8); opacity:0; pointer-events:none;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease;
}
.scene.zoom-in-ready {
  transform:scale(0.85); opacity:0; pointer-events:none;
}
.scene.active {
  transform:scale(1); opacity:1; pointer-events:auto; z-index:10;
}
.scene.hidden { display:none; }
.scene.zoom-out-reverse {
  transform:scale(0.7); opacity:0; pointer-events:none;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease;
}
.scene.zoom-in-reverse {
  transform:scale(1.5); opacity:0; pointer-events:none;
}

/* ── PARTICLES (CSS only) ── */
.particles {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.dot {
  position:absolute; border-radius:50%; background:rgba(255,255,255,0.06);
  animation:drift linear infinite;
}
@keyframes drift {
  0% { transform:translateY(0) translateX(0); opacity:0; }
  10% { opacity:1; }
  90% { opacity:1; }
  100% { transform:translateY(-100vh) translateX(40px); opacity:0; }
}

/* ── SCENE 0: LANDING ── */
#scene0 { background:#0a0a0a; }
.landing-logo { width:120px; height:120px; margin-bottom:24px; object-fit:contain; opacity:.9; }
.landing-title {
  font-size:28px; font-weight:300; color:#fff; margin-bottom:48px;
  letter-spacing:-0.01em; text-align:center;
}
.cat-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:16px;
  max-width:560px; width:100%;
}
.cat-card {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px; padding:28px 24px;
  cursor:pointer; transition:all .35s cubic-bezier(0.16,1,0.3,1);
  display:flex; flex-direction:column; align-items:center; gap:12px;
  text-align:center; backdrop-filter:blur(8px);
  position:relative; overflow:hidden;
}
.cat-card::before {
  content:''; position:absolute; inset:0; border-radius:16px;
  background:radial-gradient(circle at 50% 120%, var(--glow) 0%, transparent 70%);
  opacity:0; transition:opacity .35s;
}
.cat-card:hover::before { opacity:1; }
.cat-card:hover {
  border-color:rgba(255,255,255,0.18);
  transform:translateY(-4px);
}
.cat-card svg { position:relative; z-index:1; }
.cat-card-title { font-size:15px; font-weight:600; position:relative; z-index:1; }
.cat-card-sub { font-size:12px; color:var(--text-dim); position:relative; z-index:1; }

/* ── SCENE 1: CATEGORY ── */
.scene1-title {
  font-size:36px; font-weight:700; margin-bottom:8px;
  letter-spacing:-0.02em; text-align:center;
}
.scene1-sub { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:36px; text-align:center; }
.bio-tabs {
  display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; justify-content:center;
}
.bio-tab {
  padding:8px 20px; border-radius:24px; font-size:13px; font-weight:500;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--text-dim); cursor:pointer; transition:all .25s;
}
.bio-tab:hover { border-color:rgba(255,255,255,0.25); color:#fff; }
.bio-tab.active { background:rgba(16,185,129,0.15); border-color:rgba(16,185,129,0.4); color:#6ee7b7; }
.sub-grid {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:14px; max-width:740px; width:100%;
}
.sub-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:20px; cursor:pointer;
  transition:all .3s cubic-bezier(0.16,1,0.3,1);
  opacity:0; transform:translateY(16px);
}
.sub-card.visible { opacity:1; transform:translateY(0); transition:opacity .4s, transform .4s; }
.sub-card:hover {
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.16);
  transform:translateY(-3px);
}
.sub-card-title { font-size:14px; font-weight:600; margin-bottom:4px; }
.sub-card-desc { font-size:12px; color:var(--text-dim); line-height:1.5; }

/* ── SCENE 2: PRODUCTS ── */
.scene2-title {
  font-size:28px; font-weight:700; margin-bottom:6px;
  letter-spacing:-0.02em; text-align:center;
}
.scene2-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:32px; text-align:center; }
.prod-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:14px; max-width:820px; width:100%;
}
.prod-card {
  background:linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:22px; text-decoration:none; color:inherit;
  display:block; transition:all .3s cubic-bezier(0.16,1,0.3,1);
  opacity:0; transform:translateY(14px);
}
.prod-card.visible { opacity:1; transform:translateY(0); transition:opacity .4s, transform .4s; }
.prod-card:hover {
  background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
  border-color:rgba(255,255,255,0.18);
  transform:translateY(-3px);
}
.prod-name { font-size:15px; font-weight:600; margin-bottom:6px; }
.prod-spec { font-size:12px; color:var(--text-dim); margin-bottom:14px; line-height:1.6; }
.prod-link {
  font-size:12px; font-weight:500; display:inline-flex; align-items:center; gap:5px;
  transition:gap .2s;
}
.prod-card:hover .prod-link { gap:10px; }

/* ── BOTTOM PILL ── */
.bottom-pill {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:200;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:28px; padding:10px 24px;
  backdrop-filter:blur(16px); cursor:pointer;
  font-size:13px; color:var(--text-dim); font-weight:500;
  transition:all .3s; display:none; align-items:center; gap:8px;
}
.bottom-pill.show { display:flex; }
.bottom-pill:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); color:#fff; }

/* ── MOBILE ── */
@media (max-width:640px) {
  .topbar { padding:0 16px; }
  .cat-grid { grid-template-columns:1fr; max-width:320px; }
  .cat-card { padding:22px 20px; }
  .landing-logo { width:88px; height:88px; }
  .landing-title { font-size:22px; margin-bottom:36px; }
  .scene1-title { font-size:26px; }
  .sub-grid { grid-template-columns:1fr; }
  .prod-grid { grid-template-columns:1fr; }
  .scene { padding:32px 16px 100px; }
  .breadcrumb { font-size:12px; }
}
@media (min-width:641px) and (max-width:900px) {
  .cat-grid { max-width:480px; }
}
</style>

  // ═══════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════
  var currentLang = 'ko';
  var currentScene = 0;
  var activeBranch = null;
  var activeSub = null;
  var activeBioTab = 'use';

  // ═══════════════════════════════════════════
  // PARTICLES (CSS only)
  // ═══════════════════════════════════════════
  function createParticles() {
    var c = document.getElementById('particles');
    for (var i = 0; i < 24; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      d.style.left = (Math.random() * 100) + '%';
      d.style.top = (60 + Math.random() * 40) + '%';
      var s = (1 + Math.random() * 2) + 'px';
      d.style.width = s; d.style.height = s;
      d.style.animationDuration = (12 + Math.random() * 18) + 's';
      d.style.animationDelay = (Math.random() * 15) + 's';
      c.appendChild(d);
    }
  }

  // ═══════════════════════════════════════════
  // SCENE TRANSITIONS
  // ═══════════════════════════════════════════
  function transitionForward(fromId, toId) {
    var from = document.getElementById(fromId);
    var to = document.getElementById(toId);
    to.className = 'scene zoom-in-ready';
    // force reflow
    void to.offsetWidth;
    from.classList.add('zoom-out');
    from.classList.remove('active');
    setTimeout(function() {
      to.classList.remove('zoom-in-ready');
      to.classList.add('active');
    }, 60);
    setTimeout(function() {
      from.className = 'scene hidden';
    }, 600);
  }

  function transitionBack(fromId, toId) {
    var from = document.getElementById(fromId);
    var to = document.getElementById(toId);
    to.className = 'scene zoom-in-reverse';
    void to.offsetWidth;
    from.classList.add('zoom-out-reverse');
    from.classList.remove('active');
    setTimeout(function() {
      to.classList.remove('zoom-in-reverse');
      to.classList.add('active');
    }, 60);
    setTimeout(function() {
      from.className = 'scene hidden';
    }, 600);
  }

  // ═══════════════════════════════════════════
  // SCENE 1 BUILDER
  // ═══════════════════════════════════════════
  function buildScene1(branch) {
    var s1 = document.getElementById('scene1');
    var cat = categoryColors[branch];
    var name = branchNames[branch];
    var data = categorySubcats[branch];
    s1.style.background = cat.bg;

    var html = '';
    html += '<div class="scene1-title" style="color:'+cat.main+';" data-ko="'+name.ko+'" data-en="'+name.en+'">'+name[currentLang]+'</div>';

    var subtitle = { biobanking:{ko:'어떻게 찾으시겠어요?',en:'How would you like to search?'}, animal:{ko:'규모를 선택하세요',en:'Select your scale'}, cryo:{ko:'분야를 선택하세요',en:'Select category'}, engineering:{ko:'서비스를 선택하세요',en:'Select service'} };
    var sub = subtitle[branch];
    html += '<div class="scene1-sub" data-ko="'+sub.ko+'" data-en="'+sub.en+'">'+sub[currentLang]+'</div>';

    // Tabs for biobanking
    if (data.tabs) {
      html += '<div class="bio-tabs" id="bioTabs">';
      for (var t = 0; t < data.tabs.length; t++) {
        var tab = data.tabs[t];
        var cls = tab.id === activeBioTab ? ' active' : '';
        html += '<button class="bio-tab'+cls+'" data-tab="'+tab.id+'" data-ko="'+tab.ko+'" data-en="'+tab.en+'" onclick="switchBioTab(\''+tab.id+'\')">'+tab[currentLang]+'</button>';
      }
      html += '</div>';
    }

    // Sub cards
    html += '<div class="sub-grid" id="subGrid">';
    var items = data.tabs ? data.panels[activeBioTab] : data.items;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      html += '<div class="sub-card" data-sub="'+it.id+'" onclick="goToProducts(\''+it.id+'\',\''+branch+'\')" style="transition-delay:'+(i*60)+'ms;">';
      html += '<div class="sub-card-title" style="color:'+cat.main+';" data-ko="'+it.ko+'" data-en="'+it.en+'">'+it[currentLang]+'</div>';
      html += '<div class="sub-card-desc" data-ko="'+it.descKo+'" data-en="'+it.descEn+'">'+it['desc'+currentLang.charAt(0).toUpperCase()+currentLang.slice(1)]+'</div>';
      html += '</div>';
    }
    html += '</div>';

    s1.innerHTML = html;

    // Stagger animate cards
    setTimeout(function() {
      var cards = s1.querySelectorAll('.sub-card');
      for (var j = 0; j < cards.length; j++) {
        (function(card, delay) {
          setTimeout(function() { card.classList.add('visible'); }, delay);
        })(cards[j], j * 70);
      }
    }, 150);
  }

  // ═══════════════════════════════════════════
  // SCENE 2 BUILDER
  // ═══════════════════════════════════════════
  function buildScene2(sub, branch) {
    var s2 = document.getElementById('scene2');
    var cat = categoryColors[branch];
    var sn = subNames[sub];
    var products = productData[sub];
    if (!products) return;

    // Lighter background
    s2.style.background = 'radial-gradient(ellipse 70% 50% at 50% 30%, rgba(255,255,255,0.03) 0%, #0a0a0a 70%)';

    var colorMap = { emerald:'#10b981', amber:'#f59e0b', cyan:'#06b6d4', orange:'#f97316' };
    var linkText = currentLang === 'ko' ? '바로가기' : 'View Product';

    var html = '';
    html += '<div class="scene2-title" style="color:'+cat.main+';" data-ko="'+sn.ko+'" data-en="'+sn.en+'">'+sn[currentLang]+'</div>';
    var bn = branchNames[branch];
    html += '<div class="scene2-sub" data-ko="'+bn.ko+'" data-en="'+bn.en+'">'+bn[currentLang]+'</div>';
    html += '<div class="prod-grid">';

    for (var i = 0; i < products.length; i++) {
      var p = products[i];
      var name = p[currentLang];
      var spec = currentLang === 'ko' ? p.specKo : p.specEn;
      var c = colorMap[p.color] || '#06b6d4';
      html += '<a class="prod-card" href="'+p.url+'">';
      html += '<div class="prod-name" style="color:'+c+';">'+name+'</div>';
      html += '<div class="prod-spec">'+spec+'</div>';
      html += '<div class="prod-link" style="color:'+c+';">'+linkText+' <span>\u2192</span></div>';
      html += '</a>';
    }
    html += '</div>';

    s2.innerHTML = html;

    // Stagger animate
    setTimeout(function() {
      var cards = s2.querySelectorAll('.prod-card');
      for (var j = 0; j < cards.length; j++) {
        (function(card, delay) {
          setTimeout(function() { card.classList.add('visible'); }, delay);
        })(cards[j], j * 80);
      }
    }, 200);
  }

  // ═══════════════════════════════════════════
  // NAVIGATION
  // ═══════════════════════════════════════════
  window.goToCategory = function(branch) {
    activeBranch = branch;
    activeSub = null;
    activeBioTab = 'use';
    buildScene1(branch);
    transitionForward('scene0', 'scene1');
    currentScene = 1;
    updateUI();
  };

  window.goToProducts = function(sub, branch) {
    activeSub = sub;
    buildScene2(sub, branch);
    transitionForward('scene1', 'scene2');
    currentScene = 2;
    updateUI();
  };

  window.switchBioTab = function(tabId) {
    activeBioTab = tabId;
    // Rebuild scene1 content in place (no transition)
    buildScene1(activeBranch);
  };

  window.goBack = function() {
    if (currentScene === 2) {
      activeSub = null;
      buildScene1(activeBranch);
      transitionBack('scene2', 'scene1');
      currentScene = 1;
    } else if (currentScene === 1) {
      activeBranch = null;
      transitionBack('scene1', 'scene0');
      currentScene = 0;
    }
    updateUI();
  };

  window.resetAll = function() {
    if (currentScene === 0) return;
    activeBranch = null;
    activeSub = null;
    activeBioTab = 'use';
    // Quick reset
    var s1 = document.getElementById('scene1');
    var s2 = document.getElementById('scene2');
    var s0 = document.getElementById('scene0');
    s1.className = 'scene hidden';
    s2.className = 'scene hidden';
    s0.className = 'scene zoom-in-ready';
    void s0.offsetWidth;
    setTimeout(function() { s0.classList.remove('zoom-in-ready'); s0.classList.add('active'); }, 30);
    currentScene = 0;
    updateUI();
  };

  // ═══════════════════════════════════════════
  // BREADCRUMB + UI
  // ═══════════════════════════════════════════
  function updateUI() {
    var bar = document.getElementById('breadcrumb');
    var back = document.getElementById('backBtn');
    var pill = document.getElementById('bottomPill');

    // Back button
    if (currentScene > 0) { back.classList.add('show'); } else { back.classList.remove('show'); }

    // Bottom pill
    if (currentScene > 0) { pill.classList.add('show'); } else { pill.classList.remove('show'); }

    // Breadcrumb
    while (bar.firstChild) bar.removeChild(bar.firstChild);

    var root = document.createElement('span');
    root.className = 'crumb' + (currentScene === 0 ? ' active' : '');
    root.textContent = 'KC';
    root.onclick = function() { window.resetAll(); };
    bar.appendChild(root);

    if (activeBranch) {
      bar.appendChild(makeSep());
      var bn = branchNames[activeBranch];
      var c1 = document.createElement('span');
      c1.className = 'crumb' + (currentScene === 1 && !activeSub ? ' active' : '');
      c1.textContent = bn[currentLang];
      c1.setAttribute('data-ko', bn.ko);
      c1.setAttribute('data-en', bn.en);
      (function(b) {
        c1.onclick = function() {
          if (currentScene === 2) {
            activeSub = null;
            buildScene1(b);
            transitionBack('scene2', 'scene1');
            currentScene = 1;
            updateUI();
          }
        };
      })(activeBranch);
      bar.appendChild(c1);
    }

    if (activeSub) {
      bar.appendChild(makeSep());
      var sn = subNames[activeSub];
      var c2 = document.createElement('span');
      c2.className = 'crumb active';
      c2.textContent = sn[currentLang];
      c2.setAttribute('data-ko', sn.ko);
      c2.setAttribute('data-en', sn.en);
      bar.appendChild(c2);
    }
  }

  function makeSep() {
    var s = document.createElement('span');
    s.className = 'sep';
    s.textContent = '/';
    return s;
  }

  // ═══════════════════════════════════════════
  // LANGUAGE
  // ═══════════════════════════════════════════
  window.toggleLang = function() {
    currentLang = currentLang === 'ko' ? 'en' : 'ko';
    document.getElementById('langToggle').textContent = currentLang === 'ko' ? 'EN' : 'KO';
    // Update all data-ko/data-en elements
    var els = document.querySelectorAll('[data-ko]');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = els[i].getAttribute('data-' + currentLang);
    }
    // Rebuild current scene content if needed
    if (currentScene === 1 && activeBranch) {
      buildScene1(activeBranch);
      // Re-show cards immediately
      var cards = document.querySelectorAll('#scene1 .sub-card');
      for (var j = 0; j < cards.length; j++) cards[j].classList.add('visible');
    }
    if (currentScene === 2 && activeSub && activeBranch) {
      buildScene2(activeSub, activeBranch);
      var pcards = document.querySelectorAll('#scene2 .prod-card');
      for (var k = 0; k < pcards.length; k++) pcards[k].classList.add('visible');
    }
    updateUI();
  };

  // ═══════════════════════════════════════════
  // KEYBOARD
  // ═══════════════════════════════════════════
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.key === 'Backspace') {
      if (currentScene > 0) {
        e.preventDefault();
        window.goBack();
      }
    }
  });

  // ═══════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════
  createParticles();
  updateUI();

})();
