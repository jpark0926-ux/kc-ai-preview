<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 찾기 | Product Finder — Korea Cryo</title>
<link rel="icon" href="Logo/logo-kc.png">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060d1b;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --emerald: #10b981;
  --amber: #f59e0b;
  --cyan: #06b6d4;
  --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family:'Inter','Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%; overflow:hidden;
}

/* ── TOP BAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  background:rgba(6,13,27,0.88); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.topbar-left { display:flex; align-items:center; gap:12px; min-width:0; }
.topbar-left img { height:22px; flex-shrink:0; }
.topbar-left .divider { width:1px; height:18px; background:var(--border); flex-shrink:0; }
.back-btn {
  display:none; align-items:center; gap:4px; cursor:pointer;
  color:var(--text-dim); font-size:13px; transition:color .2s;
  background:none; border:none; white-space:nowrap; flex-shrink:0;
}
.back-btn:hover { color:#fff; }
.back-btn.show { display:flex; }
.breadcrumb {
  display:flex; align-items:center; gap:6px; font-size:13px;
  color:var(--text-dim); overflow:hidden; white-space:nowrap;
}
.breadcrumb .crumb { cursor:pointer; transition:color .2s; }
.breadcrumb .crumb:hover { color:#fff; }
.breadcrumb .crumb.active { color:#fff; font-weight:500; }
.breadcrumb .sep { opacity:.3; font-size:11px; }
.topbar-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.topbar-right a { color:var(--text-dim); text-decoration:none; font-size:13px; transition:color .2s; }
.topbar-right a:hover { color:#fff; }
.lang-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  border-radius:6px; padding:4px 12px; color:var(--text); cursor:pointer;
  font-size:12px; font-weight:500; transition:all .2s;
}
.lang-btn:hover { background:rgba(255,255,255,0.12); }

/* ── SCENE SYSTEM (Horizontal Slide) ── */
.scene {
  position:fixed; inset:0; top:56px;
  overflow-y:auto; overflow-x:hidden;
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
  z-index:1;
  display:flex; flex-direction:column; align-items:center;
  padding:48px 20px 120px;
}
.scene.active {
  transform:translateX(0); opacity:1; pointer-events:auto; z-index:10;
}
.scene.slide-left {
  transform:translateX(-30%); opacity:0; pointer-events:none;
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
}
.scene.slide-right-ready {
  transform:translateX(100%); opacity:0; pointer-events:none;
  transition: none;
}
.scene.slide-right-out {
  transform:translateX(30%); opacity:0; pointer-events:none;
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.3s ease;
}
.scene.slide-left-ready {
  transform:translateX(-100%); opacity:0; pointer-events:none;
  transition: none;
}
.scene.gone { display:none; }

/* ── SCENE 0: LANDING ── */
#scene0 { background:var(--bg); justify-content:center; }
.landing-logo { width:100px; height:100px; margin-bottom:20px; object-fit:contain; opacity:.85; }
.landing-title {
  font-size:28px; font-weight:300; color:#fff; margin-bottom:48px;
  letter-spacing:-0.01em; text-align:center; line-height:1.4;
}
.cat-stack { display:flex; flex-direction:column; gap:14px; max-width:520px; width:100%; }
.cat-card {
  position:relative; display:flex; align-items:center; gap:18px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; padding:24px; cursor:pointer;
  transition:all .35s cubic-bezier(0.32, 0.72, 0, 1);
  backdrop-filter:blur(12px); overflow:hidden;
}
.cat-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--accent); border-radius:3px 0 0 3px;
  opacity:0.6; transition:opacity .3s;
}
.cat-card:hover::before { opacity:1; }
.cat-card:hover {
  background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.14);
  transform:translateX(4px);
}
.cat-card-icon {
  width:48px; height:48px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.04); border-radius:12px; flex-shrink:0;
}
.cat-card-body { flex:1; min-width:0; }
.cat-card-title { font-size:16px; font-weight:600; margin-bottom:3px; }
.cat-card-sub { font-size:13px; color:var(--text-dim); }
.cat-card-arrow {
  flex-shrink:0; color:var(--text-dim); transition:transform .3s, color .3s;
}
.cat-card:hover .cat-card-arrow { transform:translateX(3px); color:#fff; }

/* ── SCENE 1: CATEGORY ── */
.scene1-header { text-align:center; margin-bottom:36px; }
.scene1-title {
  font-size:32px; font-weight:700; letter-spacing:-0.02em; margin-bottom:6px;
}
.scene1-sub { font-size:14px; color:rgba(255,255,255,0.5); }
.bio-tabs {
  display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; justify-content:center;
}
.bio-tab {
  padding:8px 20px; border-radius:24px; font-size:13px; font-weight:500;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  color:var(--text-dim); cursor:pointer; transition:all .25s;
}
.bio-tab:hover { border-color:rgba(255,255,255,0.2); color:#fff; }
.bio-tab.active { background:rgba(16,185,129,0.15); border-color:rgba(16,185,129,0.4); color:#6ee7b7; }
.sub-stack { display:flex; flex-direction:column; gap:12px; max-width:560px; width:100%; }
.sub-card {
  position:relative; display:flex; align-items:center; gap:16px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:14px; padding:20px 24px; cursor:pointer;
  transition:all .3s cubic-bezier(0.32, 0.72, 0, 1); overflow:hidden;
}
.sub-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--cat-color); border-radius:3px 0 0 3px; opacity:0.5;
}
.sub-card:hover {
  background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.14);
  transform:translateX(4px);
}
.sub-card-body { flex:1; min-width:0; }
.sub-card-title { font-size:15px; font-weight:600; margin-bottom:3px; }
.sub-card-desc { font-size:12px; color:var(--text-dim); line-height:1.5; }
.sub-card-arrow { flex-shrink:0; color:var(--text-dim); transition:transform .3s, color .3s; }
.sub-card:hover .sub-card-arrow { transform:translateX(3px); color:#fff; }

/* ── Card Enter Animation ── */
.card-enter {
  opacity:0; transform:translateX(40px);
}
.card-enter.visible {
  opacity:1; transform:translateX(0);
  transition:opacity 0.4s cubic-bezier(0.32, 0.72, 0, 1), transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}
.card-enter:nth-child(1) { transition-delay:0.05s; }
.card-enter:nth-child(2) { transition-delay:0.1s; }
.card-enter:nth-child(3) { transition-delay:0.15s; }
.card-enter:nth-child(4) { transition-delay:0.2s; }
.card-enter:nth-child(5) { transition-delay:0.25s; }
.card-enter:nth-child(6) { transition-delay:0.3s; }
.card-enter:nth-child(7) { transition-delay:0.35s; }
.card-enter:nth-child(8) { transition-delay:0.4s; }

/* ── SCENE 2: PRODUCTS ── */
.scene2-header { text-align:center; margin-bottom:32px; }
.scene2-title { font-size:26px; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px; }
.scene2-sub { font-size:13px; color:rgba(255,255,255,0.45); }
.prod-stack { display:flex; flex-direction:column; gap:12px; max-width:560px; width:100%; }
.prod-card {
  position:relative; display:flex; align-items:center; gap:16px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:14px; padding:22px 24px; text-decoration:none; color:inherit;
  transition:all .3s cubic-bezier(0.32, 0.72, 0, 1); overflow:hidden;
}
.prod-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--prod-color); border-radius:3px 0 0 3px; opacity:0.5;
}
.prod-card:hover {
  background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.14);
  transform:translateX(4px);
}
.prod-card-body { flex:1; min-width:0; }
.prod-name { font-size:15px; font-weight:600; margin-bottom:4px; }
.prod-spec { font-size:12px; color:var(--text-dim); line-height:1.5; }
.prod-link {
  flex-shrink:0; font-size:12px; font-weight:500; display:flex;
  align-items:center; gap:5px; transition:gap .2s;
  white-space:nowrap;
}
.prod-card:hover .prod-link { gap:10px; }

/* ── BOTTOM PILL ── */
.bottom-pill {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:200;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:28px; padding:10px 24px;
  backdrop-filter:blur(16px); cursor:pointer;
  font-size:13px; color:var(--text-dim); font-weight:500;
  transition:all .3s; display:none; align-items:center; gap:8px;
}
.bottom-pill.show { display:flex; }
.bottom-pill:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); color:#fff; }

/* ── DESKTOP: 2x2 grid for landing ── */
@media (min-width:641px) {
  .cat-stack {
    display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:600px;
  }
  .cat-card { flex-direction:column; text-align:center; padding:32px 24px; gap:14px; }
  .cat-card::before { left:0; top:0; bottom:auto; width:100%; height:3px; border-radius:3px 3px 0 0; }
  .cat-card-icon { margin:0 auto; }
  .cat-card-arrow { position:absolute; right:16px; top:50%; transform:translateY(-50%); }
  .cat-card:hover .cat-card-arrow { transform:translateY(-50%) translateX(3px); }
  .cat-card:hover { transform:translateY(-4px) translateX(0); }
  .sub-stack { max-width:640px; }
  .prod-stack { max-width:640px; }
}

/* ── MOBILE ── */
@media (max-width:640px) {
  .topbar { padding:0 14px; }
  .landing-logo { width:72px; height:72px; }
  .landing-title { font-size:22px; margin-bottom:36px; }
  .scene1-title { font-size:24px; }
  .scene2-title { font-size:22px; }
  .scene { padding:36px 16px 110px; }
  .breadcrumb { font-size:12px; }
  .cat-card { padding:20px; }
}
</style>
</head>

  /* ═══════════════════════════════════════════
     HORIZONTAL SLIDE TRANSITIONS
     ═══════════════════════════════════════════ */
  function slideForward(fromId, toId, cb) {
    if (transitioning) return;
    transitioning = true;
    var from = document.getElementById(fromId);
    var to = document.getElementById(toId);
    to.className = 'scene slide-right-ready';
    to.scrollTop = 0;
    void to.offsetWidth;
    from.className = 'scene slide-left';
    to.className = 'scene active';
    setTimeout(function() {
      from.className = 'scene gone';
      transitioning = false;
      if (cb) cb();
    }, 520);
  }

  function slideBack(fromId, toId, cb) {
    if (transitioning) return;
    transitioning = true;
    var from = document.getElementById(fromId);
    var to = document.getElementById(toId);
    to.className = 'scene slide-left-ready';
    void to.offsetWidth;
    from.className = 'scene slide-right-out';
    to.className = 'scene active';
    setTimeout(function() {
      from.className = 'scene gone';
      transitioning = false;
      if (cb) cb();
    }, 520);
  }

  /* ═══════════════════════════════════════════
     SAFE DOM BUILDER HELPERS
     ═══════════════════════════════════════════ */
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'textContent') { node.textContent = attrs[k]; }
        else if (k === 'className') { node.className = attrs[k]; }
        else if (k === 'onclick') { node.onclick = attrs[k]; }
        else if (k.indexOf('data-') === 0) { node.setAttribute(k, attrs[k]); }
        else { node.setAttribute(k, attrs[k]); }
      });
    }
    if (children) {
      children.forEach(function(c) {
        if (typeof c === 'string') { node.appendChild(document.createTextNode(c)); }
        else if (c) { node.appendChild(c); }
      });
    }
    return node;
  }

  function svgArrow(w, h) {
    var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('width', w); s.setAttribute('height', h);
    s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor');
    s.setAttribute('stroke-width','1.5'); s.setAttribute('viewBox','0 0 24 24');
    var p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
    p.setAttribute('d','M8.25 4.5l7.5 7.5-7.5 7.5');
    s.appendChild(p);
    return s;
  }

  function svgArrowRight(w, h) {
    var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('width', w); s.setAttribute('height', h);
    s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor');
    s.setAttribute('stroke-width','1.5'); s.setAttribute('viewBox','0 0 24 24');
    var p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
    p.setAttribute('d','M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3');
    s.appendChild(p);
    return s;
  }

  /* ═══════════════════════════════════════════
     SCENE 1 BUILDER (DOM-based)
     ═══════════════════════════════════════════ */
  function buildScene1(branch) {
    var s1 = document.getElementById('scene1');
    var cat = categoryColors[branch];
    var name = branchNames[branch];
    var data = categorySubcats[branch];
    s1.style.background = cat.bg;
    while (s1.firstChild) s1.removeChild(s1.firstChild);

    var subtitle = {
      biobanking:{ko:'어떻게 찾으시겠어요?',en:'How would you like to search?'},
      animal:{ko:'규모를 선택하세요',en:'Select your scale'},
      cryo:{ko:'분야를 선택하세요',en:'Select category'},
      engineering:{ko:'서비스를 선택하세요',en:'Select service'}
    };
    var sub = subtitle[branch];

    var header = el('div',{className:'scene1-header'},[
      el('div',{className:'scene1-title',style:'color:'+cat.main+';','data-ko':name.ko,'data-en':name.en,textContent:name[currentLang]}),
      el('div',{className:'scene1-sub','data-ko':sub.ko,'data-en':sub.en,textContent:sub[currentLang]})
    ]);
    s1.appendChild(header);

    if (data.tabs) {
      var tabsDiv = el('div',{className:'bio-tabs',id:'bioTabs'});
      data.tabs.forEach(function(tab) {
        var cls = 'bio-tab' + (tab.id === activeBioTab ? ' active' : '');
        var btn = el('button',{className:cls,'data-tab':tab.id,'data-ko':tab.ko,'data-en':tab.en,textContent:tab[currentLang]});
        btn.onclick = function(){ switchBioTab(tab.id); };
        tabsDiv.appendChild(btn);
      });
      s1.appendChild(tabsDiv);
    }

    var stack = el('div',{className:'sub-stack',id:'subStack'});
    var items = data.tabs ? data.panels[activeBioTab] : data.items;
    items.forEach(function(it) {
      var descKey = 'desc' + currentLang.charAt(0).toUpperCase() + currentLang.slice(1);
      var card = el('div',{className:'sub-card card-enter',style:'--cat-color:'+cat.main+';','data-sub':it.id},[
        el('div',{className:'sub-card-body'},[
          el('div',{className:'sub-card-title',style:'color:'+cat.main+';','data-ko':it.ko,'data-en':it.en,textContent:it[currentLang]}),
          el('div',{className:'sub-card-desc','data-ko':it.descKo,'data-en':it.descEn,textContent:it[descKey]})
        ]),
        el('div',{className:'sub-card-arrow'},[svgArrow(18,18)])
      ]);
      card.onclick = function(){ goToProducts(it.id, branch); };
      stack.appendChild(card);
    });
    s1.appendChild(stack);

    setTimeout(function() {
      var cards = s1.querySelectorAll('.card-enter');
      for (var j = 0; j < cards.length; j++) cards[j].classList.add('visible');
    }, 80);
  }

  /* ═══════════════════════════════════════════
     SCENE 2 BUILDER (DOM-based)
     ═══════════════════════════════════════════ */
  function buildScene2(sub, branch) {
    var s2 = document.getElementById('scene2');
    var cat = categoryColors[branch];
    var sn = subNames[sub];
    var products = productData[sub];
    if (!products) return;
    s2.style.background = cat.bg;
    while (s2.firstChild) s2.removeChild(s2.firstChild);

    var colorMap = { emerald:'#10b981', amber:'#f59e0b', cyan:'#06b6d4', orange:'#f97316' };
    var linkText = currentLang === 'ko' ? '바로가기' : 'View';
    var bn = branchNames[branch];

    var header = el('div',{className:'scene2-header'},[
      el('div',{className:'scene2-title',style:'color:'+cat.main+';','data-ko':sn.ko,'data-en':sn.en,textContent:sn[currentLang]}),
      el('div',{className:'scene2-sub','data-ko':bn.ko,'data-en':bn.en,textContent:bn[currentLang]})
    ]);
    s2.appendChild(header);

    var stack = el('div',{className:'prod-stack'});
    products.forEach(function(p) {
      var pname = p[currentLang];
      var spec = currentLang === 'ko' ? p.specKo : p.specEn;
      var c = colorMap[p.color] || '#06b6d4';
      var card = el('a',{className:'prod-card card-enter',style:'--prod-color:'+c+';',href:p.url},[
        el('div',{className:'prod-card-body'},[
          el('div',{className:'prod-name',style:'color:'+c+';',textContent:pname}),
          el('div',{className:'prod-spec',textContent:spec})
        ]),
        el('div',{className:'prod-link',style:'color:'+c+';'},[
          document.createTextNode(linkText + ' '),
          svgArrowRight(16,16)
        ])
      ]);
      stack.appendChild(card);
    });
    s2.appendChild(stack);

    setTimeout(function() {
      var cards = s2.querySelectorAll('.card-enter');
      for (var j = 0; j < cards.length; j++) cards[j].classList.add('visible');
    }, 80);
  }

    updateUI();

  window.switchBioTab = function(tabId) {
    activeBioTab = tabId;
    buildScene1(activeBranch);
    var cards = document.querySelectorAll('#scene1 .card-enter');
    for (var j = 0; j < cards.length; j++) cards[j].classList.add('visible');
  };

  window.goBack = function() {
    if (transitioning) return;
    if (currentScene === 2) {
      activeSub = null;
      buildScene1(activeBranch);
      var cards1 = document.querySelectorAll('#scene1 .card-enter');
      for (var k = 0; k < cards1.length; k++) cards1[k].classList.add('visible');
      slideBack('scene2', 'scene1');
      currentScene = 1;
    } else if (currentScene === 1) {
      activeBranch = null;
      slideBack('scene1', 'scene0');
      currentScene = 0;
    }
    updateUI();
  };

  window.resetAll = function() {
    if (currentScene === 0 || transitioning) return;
    transitioning = true;
    activeBranch = null;
    activeSub = null;
    activeBioTab = 'use';
    var s0 = document.getElementById('scene0');
    var s1 = document.getElementById('scene1');
    var s2 = document.getElementById('scene2');
    s1.className = 'scene gone';
    s2.className = 'scene gone';
    s0.className = 'scene slide-right-ready';
    void s0.offsetWidth;
    s0.className = 'scene active';
    currentScene = 0;
    updateUI();
    setTimeout(function() { transitioning = false; }, 520);
  };

  /* ═══════════════════════════════════════════
     BREADCRUMB + UI
     ═══════════════════════════════════════════ */
  function updateUI() {
    var bar = document.getElementById('breadcrumb');
    var back = document.getElementById('backBtn');
    var pill = document.getElementById('bottomPill');

    if (currentScene > 0) { back.classList.add('show'); } else { back.classList.remove('show'); }
    if (currentScene > 0) { pill.classList.add('show'); } else { pill.classList.remove('show'); }

    while (bar.firstChild) bar.removeChild(bar.firstChild);

    var root = el('span',{className:'crumb' + (currentScene === 0 ? ' active' : ''),textContent:'KC'});
    root.onclick = function() { window.resetAll(); };
    bar.appendChild(root);

    if (activeBranch) {
      bar.appendChild(makeSep());
      var bn = branchNames[activeBranch];
      var c1 = el('span',{className:'crumb' + (currentScene === 1 && !activeSub ? ' active' : ''),'data-ko':bn.ko,'data-en':bn.en,textContent:bn[currentLang]});
      (function(b) {
        c1.onclick = function() {
          if (currentScene === 2) {
            activeSub = null;
            buildScene1(b);
            var cards = document.querySelectorAll('#scene1 .card-enter');
            for (var k = 0; k < cards.length; k++) cards[k].classList.add('visible');
            slideBack('scene2', 'scene1');
            currentScene = 1;
            updateUI();
          }
        };
      })(activeBranch);
      bar.appendChild(c1);
    }

    if (activeSub) {
      bar.appendChild(makeSep());
      var sn = subNames[activeSub];
      bar.appendChild(el('span',{className:'crumb active','data-ko':sn.ko,'data-en':sn.en,textContent:sn[currentLang]}));
    }
  }

  function makeSep() {
    return el('span',{className:'sep',textContent:'/'});
  }

  /* ═══════════════════════════════════════════
     LANGUAGE
     ═══════════════════════════════════════════ */
  window.toggleLang = function() {
    currentLang = currentLang === 'ko' ? 'en' : 'ko';
    document.getElementById('langToggle').textContent = currentLang === 'ko' ? 'EN' : 'KO';
    var els = document.querySelectorAll('[data-ko]');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = els[i].getAttribute('data-' + currentLang);
    }
    if (currentScene === 1 && activeBranch) {
      buildScene1(activeBranch);
      var cards = document.querySelectorAll('#scene1 .card-enter');
      for (var j = 0; j < cards.length; j++) cards[j].classList.add('visible');
    }
    if (currentScene === 2 && activeSub && activeBranch) {
      buildScene2(activeSub, activeBranch);
      var pcards = document.querySelectorAll('#scene2 .card-enter');
      for (var k = 0; k < pcards.length; k++) pcards[k].classList.add('visible');
    }
    updateUI();
  };

  /* ═══════════════════════════════════════════
     TOUCH SWIPE (mobile back gesture)
     ═══════════════════════════════════════════ */
  var touchStartX = 0;
  var touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dx > 80 && dy < 80 && currentScene > 0) {
      window.goBack();
    }
  }, { passive: true });

  /* ═══════════════════════════════════════════
     KEYBOARD
     ═══════════════════════════════════════════ */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.key === 'Backspace') {
      if (currentScene > 0) {
        e.preventDefault();
        window.goBack();
      }
    }
  });

  /* ═══════════════════════════════════════════
     INIT
     ═══════════════════════════════════════════ */
  updateUI();

})();
</script>
</body>
</html>
